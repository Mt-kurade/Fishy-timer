<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>fishyyyyyy · bowl</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }

  /*
   * Window: 420 × 360px
   * Bowl body ellipse: cx=210, cy=195, rx=205, ry=165
   * As % of window:    cx=50%, cy=54.2%, rx=48.8%, ry=45.8%
   * The clip-path matches the SVG body ellipse exactly so border = clip edge.
   * The rim opening sits at cy=42 (above the body) — this sticks out above the clip,
   * which is intentional: the open top of the bowl.
   */
  #bowl-root {
    position: fixed; inset: 0;
    /* Clip to the main bowl body ellipse — matches SVG below precisely */
    clip-path: ellipse(48.8% 45.8% at 50% 54.2%);
  }

  /* Solid dark background inside the clipped bowl */
  #bowl-bg-fill {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 88% 82% at 50% 56%, #111111 60%, #080808 100%);
  }

  /* Fish swimming layer */
  #bowl-fish { position: absolute; inset: 0; overflow: hidden; }
  .bf {
    position: absolute;
    /* Light / white fish so they show on the dark background */
    color: rgba(210, 210, 210, 0.90);
    font-family: 'Courier New', monospace;
    white-space: pre; line-height: 1.2;
    pointer-events: none; user-select: none;
  }

  /* Bubbles */
  #bubbles { position: absolute; inset: 0; pointer-events: none; }
  .bubble {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.13);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scale(1);   opacity: 0.55; }
    100% { transform: translateY(-120px) scale(1.7); opacity: 0; }
  }

  /* Glass SVG sits on top — pointer-events off so clicks pass through */
  #bowl-glass { position: absolute; inset: 0; pointer-events: none; z-index: 4; }

  /* Timer content — centred inside the bowl body */
  #content {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    /* Nudge content down slightly to sit in visual centre of bowl body */
    padding-top: 10px;
    gap: 6px;
  }

  /* Big clock — clearly readable */
  .clock {
    font-family: 'Times New Roman', Times, serif;
    font-size: 4rem; font-weight: 700;
    color: #e8e8e8; letter-spacing: -0.02em; line-height: 1;
    text-align: center;
  }
  .clock .sep { color: #555; animation: blink 1s step-end infinite; }
  .clock.paused .sep { animation: none; opacity: 0.25; }
  @keyframes blink { 50% { opacity: 0.1; } }

  .mode-lbl {
    font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: #484848; font-family: 'Times New Roman', serif;
  }
  .lap-tick {
    font-family: 'Courier New', monospace;
    font-size: 0.55rem; letter-spacing: 0.07em; color: #555; min-height: 14px;
  }
  .lap-tick .t { color: #888; }

  .btns { display: flex; gap: 6px; margin-top: 6px; }
  .bb {
    background: none; border: 1px solid rgba(255,255,255,0.12);
    color: #666; font-family: 'Times New Roman', serif;
    font-size: 0.5rem; letter-spacing: 0.09em; text-transform: uppercase;
    padding: 5px 11px; cursor: pointer; transition: all 0.12s;
  }
  .bb:hover { border-color: rgba(255,255,255,0.32); color: #bbb; }
  .bb.bp { border-color: rgba(255,255,255,0.2); color: #aaa; }
  .bb:disabled { opacity: 0.15; cursor: not-allowed; }
  .bb.red:hover { border-color: #7a2020; color: #b53030; }

  /* Close button — top-right, inside the clipped bowl area.
     At 13% from top & right it sits safely within the ellipse. */
  #close-btn {
    position: absolute; top: 14%; right: 14%; z-index: 10;
    background: none; border: 1px solid rgba(255,255,255,0.14);
    color: #555; font-family: 'Courier New', monospace;
    font-size: 0.6rem; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.12s; line-height: 1;
  }
  #close-btn:hover { border-color: #7a2020; color: #b53030; }

  /* Lap modal */
  #lap-ovl {
    position: absolute; inset: 0; background: rgba(0,0,0,0.93);
    z-index: 20; display: none; align-items: center; justify-content: center;
  }
  .lm {
    background: #0a0a0a; border: 1px solid rgba(255,255,255,0.15);
    padding: 1rem 1.2rem; width: 230px;
  }
  .lm h3 { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb; margin-bottom: 0.4rem; font-family: 'Times New Roman', serif; }
  .lm p  { font-size: 0.5rem; color: #555; margin-bottom: 0.7rem; letter-spacing: 0.06em; font-family: 'Times New Roman', serif; }
  .lm p span { color: #888; }
  .lm input {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.14);
    color: #ccc; font-family: 'Times New Roman', serif; font-size: 0.55rem;
    padding: 5px 8px; outline: none; margin-bottom: 0.7rem; letter-spacing: 0.04em;
  }
  .lm input:focus { border-color: #666; }
  .lm input::placeholder { color: #2a2a2a; }
  .lm-acts { display: flex; gap: 5px; justify-content: flex-end; }
</style>
</head>
<body>

<div id="bowl-root">

  <!-- 1. Dark background (filled by clip-path ellipse) -->
  <div id="bowl-bg-fill"></div>

  <!-- 2. Fish swimming inside the bowl -->
  <div id="bowl-fish"></div>

  <!-- 3. Rising bubbles -->
  <div id="bubbles"></div>

  <!--
    4. Glass SVG — drawn on top so the rim, edge ring and sheen overlay everything.
       viewBox matches the window: 420 × 360.
       Main bowl body ellipse: cx=210 cy=195 rx=205 ry=165  (same as clip-path above)
       Open rim ellipse at top: cy=42 (the visible open mouth of the bowl)
  -->
  <svg id="bowl-glass" viewBox="0 0 420 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <!-- Upper-left glass sheen -->
      <radialGradient id="shineL" cx="26%" cy="28%" r="32%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.07)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <!-- Lower-right secondary sheen -->
      <radialGradient id="shineR" cx="75%" cy="72%" r="22%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.035)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <!-- Rim gradient — brighter in the middle like real glass -->
      <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.03)"/>
        <stop offset="28%"  stop-color="rgba(255,255,255,0.20)"/>
        <stop offset="52%"  stop-color="rgba(255,255,255,0.30)"/>
        <stop offset="76%"  stop-color="rgba(255,255,255,0.18)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
      </linearGradient>
      <clipPath id="bowlClip">
        <ellipse cx="210" cy="195" rx="205" ry="165"/>
      </clipPath>
    </defs>

    <!-- Outer glass edge ring — this IS the bowl border, matching clip-path -->
    <ellipse cx="210" cy="195" rx="205" ry="165"
             fill="none" stroke="rgba(190,190,190,0.22)" stroke-width="1.8"/>

    <!-- Glass sheen overlays (clipped so they don't bleed outside) -->
    <ellipse cx="210" cy="195" rx="205" ry="165" fill="url(#shineL)" clip-path="url(#bowlClip)"/>
    <ellipse cx="210" cy="195" rx="205" ry="165" fill="url(#shineR)" clip-path="url(#bowlClip)"/>

    <!-- Upper-left highlight streak (like the glint on real glass) -->
    <ellipse cx="118" cy="108" rx="22" ry="62"
             fill="rgba(255,255,255,0.030)" transform="rotate(-22 118 108)"/>

    <!-- ── Open rim at the top ── -->
    <!-- The rim sits at y≈42, width matches roughly the bowl opening at that height.
         At cy=195, the bowl width at y=42 is: rx * sqrt(1-((42-195)/165)^2) ≈ 135px each side -->
    <!-- Outer rim ellipse -->
    <ellipse cx="210" cy="42" rx="148" ry="19"
             fill="rgba(14,14,14,0.0)" stroke="rgba(200,200,200,0.35)" stroke-width="1.8"/>
    <!-- Rim fill — glass thickness colour -->
    <ellipse cx="210" cy="42" rx="148" ry="19" fill="url(#rimGrad)" opacity="0.8"/>
    <!-- Inner rim shadow (depth of the glass wall) -->
    <ellipse cx="210" cy="46" rx="132" ry="12"
             fill="rgba(0,0,0,0.20)" stroke="rgba(255,255,255,0.06)" stroke-width="0.7"/>

    <!-- Rim-to-body transition curves (glass wall thickness on left & right) -->
    <path d="M 62,42 Q 59,46 62,56"  stroke="rgba(255,255,255,0.16)" stroke-width="1.4" fill="none"/>
    <path d="M 358,42 Q 361,46 358,56" stroke="rgba(255,255,255,0.16)" stroke-width="1.4" fill="none"/>

    <!-- Subtle water line near the bottom of the bowl -->
    <text x="30" y="295"
          font-family="'Courier New',monospace" font-size="7.5"
          fill="rgba(90,90,90,0.30)" letter-spacing="3.5">~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~</text>

    <!-- Base foot / stand shadow -->
    <ellipse cx="210" cy="356" rx="90" ry="7"
             fill="rgba(255,255,255,0.018)" stroke="rgba(255,255,255,0.07)" stroke-width="0.9"/>
  </svg>

  <!-- 5. Timer content -->
  <div id="content">
    <div class="clock paused" id="clock">
      <span id="sm">00</span><span class="sep">:</span><span id="ss">00</span>
    </div>
    <div class="mode-lbl" id="mlbl">// stopwatch</div>
    <div class="lap-tick" id="ltick"></div>
    <div class="btns">
      <button class="bb red" onclick="doReset()">[ rst ]</button>
      <button class="bb bp" id="sbtn" onclick="doToggle()">[ start ]</button>
      <button class="bb" id="lbtn" onclick="doLap()" disabled>[ lap ]</button>
    </div>
  </div>

  <!-- 6. Close button (inside the ellipse area) -->
  <button id="close-btn" onclick="window.close()">✕</button>

  <!-- 7. Lap naming modal -->
  <div id="lap-ovl">
    <div class="lm">
      <h3>// name this block</h3>
      <p>duration: <span id="ldur">—</span></p>
      <input type="text" id="linput" placeholder="subject / topic ..." maxlength="40"/>
      <div class="lm-acts">
        <button class="bb" onclick="cancelLap()">[ cancel ]</button>
        <button class="bb bp" onclick="saveLap()">[ save ]</button>
      </div>
    </div>
  </div>

</div><!-- #bowl-root -->

<script>
// ── State via localStorage ─────────────────────────────────────────────────────
const KEY = 'fishbowl_state';
function getState(){ try{ return JSON.parse(localStorage.getItem(KEY)||'null'); }catch{ return null; } }
function setState(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch{} }

const pad = n => String(Math.floor(Math.abs(n))).padStart(2,'0');
const fmt = s => `${pad(s/60)}:${pad(s%60)}`;

let lT=0, lRun=false, lMode='stopwatch', lLs=0, lLaps=[];
let sAt=null, pend=null;

function getCurT(){
  if(!lRun || sAt===null) return lT;
  const el = (performance.now()-sAt)/1000;
  return lMode==='countdown' ? Math.max(0,lT-el) : lT+el;
}

function updDisp(){
  const t = Math.floor(getCurT());
  document.getElementById('sm').textContent = pad(t/60);
  document.getElementById('ss').textContent = pad(t%60);
  document.getElementById('clock').classList.toggle('paused', !lRun);
  document.getElementById('mlbl').textContent = `// ${lMode}`;
  const lt = document.getElementById('ltick');
  if(lRun){ const e=getCurT()-lLs; lt.innerHTML=`lap ${lLaps.length+1} <span class="t">${fmt(e)}</span>`; }
  else lt.textContent = '';
  document.getElementById('sbtn').textContent = lRun ? '[ pause ]' : '[ start ]';
  document.getElementById('lbtn').disabled = !lRun;
}

function pushUp(){
  setState({
    t: getCurT(), run: lRun, mode: lMode, ls: lLs, laps: lLaps,
    startWall: lRun ? Date.now()-(performance.now()-sAt) : null
  });
}

function syncDown(){
  const st = getState(); if(!st) return;
  const wasRun = lRun;
  if(st.run !== lRun || Math.abs(st.t - lT) > 1.5){
    lT=st.t; lRun=st.run; lMode=st.mode||'stopwatch'; lLs=st.ls||0; lLaps=st.laps||[];
    if(lRun && !wasRun && st.startWall){ sAt = performance.now()-(Date.now()-st.startWall); }
    else if(!lRun){ sAt=null; }
  }
  updDisp();
}

// ── Controls ──────────────────────────────────────────────────────────────────
function doToggle(){
  if(lRun){ lT=getCurT(); sAt=null; lRun=false; }
  else { sAt=performance.now(); lRun=true; }
  pushUp(); updDisp();
}
function doReset(){
  lT=0; lRun=false; sAt=null; lLs=0; lLaps=[]; pend=null;
  document.getElementById('lap-ovl').style.display='none';
  pushUp(); updDisp();
}
function doLap(){
  if(!lRun) return;
  const now=getCurT(); const dur=now-lLs; if(dur<1) return;
  pend={start:lLs, end:now, duration:dur};
  document.getElementById('ldur').textContent = fmt(dur);
  document.getElementById('linput').value = '';
  document.getElementById('lap-ovl').style.display = 'flex';
  setTimeout(()=>document.getElementById('linput').focus(), 30);
}
function saveLap(){
  const name = document.getElementById('linput').value.trim() || `block ${lLaps.length+1}`;
  lLaps.push({...pend, name, ci:lLaps.length%6});
  lLs=pend.end; pend=null;
  document.getElementById('lap-ovl').style.display = 'none';
  pushUp(); updDisp();
}
function cancelLap(){ pend=null; document.getElementById('lap-ovl').style.display='none'; }
document.getElementById('linput').addEventListener('keydown', e=>{
  if(e.key==='Enter') saveLap();
  if(e.key==='Escape') cancelLap();
});

// ── Tick + sync ───────────────────────────────────────────────────────────────
setInterval(()=>{
  if(lRun){
    if(lMode==='countdown' && getCurT()<=0){ doReset(); return; }
    updDisp(); pushUp();
  }
}, 250);
setInterval(syncDown, 1000);

// ── Bowl fish ─────────────────────────────────────────────────────────────────
// Larger ASCII designs, light/white colour on dark background
const bowlFish = [
  { l:[`><(((º>`,`><((( >`], r:[`<º)))><`,`< )))><`] },
  { l:[`>°)))><`,`>°)))-`],  r:[`<(((°<`, `-(((°<`]  },
  { l:[`>·(((º>`,`>=(((º>`], r:[`<º)))·<`,`<º)))==<`] },
  { l:[`-º))))>`,`-°))))>`], r:[`<((((º-`,`<((((°-`]  },
  { l:[`»»»º>`,`»»»°>`],     r:[`<º«««`,  `<°«««`]    },
  { l:[`~·~·º>`,`~·~·°>`],   r:[`<º·~·~`, `<°·~·~`]   },
  { l:[`===º>>>`,`===°>>>`],  r:[`<<<º===`,`<<<°===`]   },
  { l:[`ø·ø·ø>`,`ø·ø·ø-`],   r:[`<ø·ø·ø`, `-ø·ø·ø`]   },
  { l:[`*==º==>`,`*==°==>`],  r:[`<==º==*`, `<==°==*`]  },
  { l:[`--·º)>`,`--·°)>`],    r:[`<(º·--`, `<(°·--`]   },
];

const bents=[]; let bframe=0;

function spawnBF(){
  const sky = document.getElementById('bowl-fish');
  const spec = bowlFish[Math.floor(Math.random()*bowlFish.length)];
  const fr = Math.random() > 0.5;
  const frames = fr ? spec.r : spec.l;
  const el = document.createElement('div');
  el.className = 'bf';
  el.textContent = frames[0];
  // Fish size: 1.1rem – 1.8rem — clearly visible
  el.style.fontSize = `${(Math.random()*0.7 + 1.1).toFixed(2)}rem`;
  el.style.opacity  = (Math.random()*0.18 + 0.78).toFixed(2);
  // Y stays within bowl body: 20% – 68%
  const yp = Math.random()*48 + 20;
  let xp = fr ? 112 : -20;
  el.style.top  = yp+'%';
  el.style.left = xp+'%';
  sky.appendChild(el);
  let fi=0;
  const wig = setInterval(()=>{
    if(!el.isConnected){ clearInterval(wig); return; }
    fi=(fi+1)%frames.length; el.textContent=frames[fi];
  }, 320+Math.random()*360);
  return { el, xp, yp, speed:Math.random()*0.55+0.18, dir:fr?-1:1,
           wave:Math.random()*Math.PI*2, wAmp:Math.random()*1.6+0.6, wig };
}

// Seed 7 fish already spread inside the bowl
for(let i=0; i<7; i++){
  const e = spawnBF();
  if(e){ e.xp=Math.random()*68+8; e.el.style.left=e.xp+'%'; bents.push(e); }
}

function animBowl(){
  bframe++;
  if(bframe%95===0 && Math.random()>0.38){ const e=spawnBF(); if(e) bents.push(e); }
  for(let i=bents.length-1; i>=0; i--){
    const e=bents[i];
    if(!e || !e.el.isConnected){ bents.splice(i,1); continue; }
    e.xp += e.speed*e.dir*0.07;
    const yo = Math.sin(bframe*0.028+e.wave)*e.wAmp;
    e.el.style.left = e.xp+'%';
    e.el.style.top  = (e.yp+yo)+'%';
    if((e.dir===-1 && e.xp<-24)||(e.dir===1 && e.xp>116)){
      clearInterval(e.wig); e.el.remove(); bents.splice(i,1);
    }
  }
  requestAnimationFrame(animBowl);
}
requestAnimationFrame(animBowl);

// ── Bubbles ───────────────────────────────────────────────────────────────────
const bc = document.getElementById('bubbles');
[4,5,4,6,5,4,7,5,6,4].forEach((s,i)=>{
  const b = document.createElement('div'); b.className='bubble';
  b.style.width  = s+'px';
  b.style.height = s+'px';
  b.style.left   = (22+Math.random()*56)+'%';
  b.style.bottom = (8+Math.random()*24)+'%';
  b.style.animationDuration = (5+Math.random()*5)+'s';
  b.style.animationDelay   = (i*0.75+Math.random()*3)+'s';
  bc.appendChild(b);
});

// ── Init ──────────────────────────────────────────────────────────────────────
(function init(){
  const st = getState();
  if(st){
    lT=st.t??0; lRun=st.run??false; lMode=st.mode??'stopwatch';
    lLs=st.ls??0; lLaps=st.laps??[];
    if(lRun && st.startWall){ sAt=performance.now()-(Date.now()-st.startWall); }
  }
  updDisp();
})();
</script>
</body>
</html>
