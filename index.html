<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fishyyyyyy Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
  :root {
    --bg:#080808; --s1:rgba(255,255,255,0.03); --s2:rgba(255,255,255,0.06);
    --b1:rgba(255,255,255,0.08); --b2:rgba(255,255,255,0.16);
    --text:#d0d0d0; --dim:#555; --dim2:#333; --acc:#999; --acc2:#777; --red:#b53030;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Times New Roman',Times,serif;min-height:100vh;overflow-x:hidden;}
  #ascii-sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .ascii-entity{position:absolute;color:rgba(210,210,210,0.6);font-family:'Courier New',Courier,monospace;white-space:pre;line-height:1.2;pointer-events:none;user-select:none;}
  .app{position:relative;z-index:1;display:grid;grid-template-columns:1fr 310px;min-height:100vh;}
  .main{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:2rem;}
  .mode-row{display:flex;align-items:center;gap:4px;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim2);}
  .mode-sep{color:var(--dim2);}
  .mbtn{background:none;border:none;font-family:'Times New Roman',Times,serif;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);cursor:pointer;padding:2px 6px;transition:color 0.12s;}
  .mbtn:hover{color:var(--acc);}
  .mbtn.on{color:var(--text);text-decoration:underline;text-underline-offset:4px;}
  .clock-wrap{text-align:center;}
  .clock{font-family:'Times New Roman',Times,serif;font-size:clamp(4.5rem,16vw,11rem);font-weight:700;letter-spacing:-0.02em;color:var(--text);line-height:1;}
  .clock .sep{color:var(--dim);animation:blink 1s step-end infinite;}
  .clock.paused .sep{animation:none;opacity:0.25;}
  @keyframes blink{50%{opacity:0.12;}}
  .ticker{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-top:0.65rem;height:15px;}
  .ticker .t{color:var(--acc);}
  .controls{display:flex;gap:8px;align-items:center;}
  .btn{background:none;border:1px solid var(--b1);color:var(--dim);font-family:'Times New Roman',Times,serif;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;padding:7px 16px;cursor:pointer;transition:all 0.12s;}
  .btn:hover{border-color:var(--b2);color:var(--acc);}
  .btn:active{opacity:0.5;}
  .btn.main{border-color:var(--acc2);color:var(--text);padding:8px 26px;font-size:0.65rem;}
  .btn.main:hover{border-color:var(--text);}
  .btn.lap-b{border-color:var(--b2);color:var(--acc2);}
  .btn.lap-b:disabled{opacity:0.18;cursor:not-allowed;}
  .btn.red:hover{border-color:var(--red);color:var(--red);}
  .btn.popout{border-color:var(--b2);color:var(--acc2);font-family:'Courier New',monospace;font-size:0.6rem;}
  .btn.popout:hover{border-color:var(--acc);color:var(--text);}
  .btn.popout.active{border-color:var(--acc);color:var(--acc);}
  .tips{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;font-size:0.56rem;color:var(--dim2);letter-spacing:0.08em;text-transform:uppercase;}
  .k{border:1px solid var(--dim2);padding:1px 4px;font-size:0.53rem;}
  .side{border-left:1px solid var(--b1);background:var(--s1);display:flex;flex-direction:column;overflow:hidden;font-size:0.6rem;}
  .phd{padding:0.9rem 1rem;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim2);}
  .phd button{background:none;border:none;font-family:'Times New Roman',Times,serif;font-size:0.53rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim2);cursor:pointer;transition:color 0.12s;}
  .phd button:hover{color:var(--red);}
  .laps-list{flex:1;overflow-y:auto;padding:0.5rem;display:flex;flex-direction:column;gap:4px;}
  .laps-list::-webkit-scrollbar{width:2px;}
  .laps-list::-webkit-scrollbar-thumb{background:var(--b1);}
  .empty-msg{color:var(--dim2);font-size:0.56rem;line-height:2;padding:0.3rem;letter-spacing:0.06em;}
  .lap-item{border-left:2px solid var(--lc,var(--dim));padding:6px 10px;background:var(--s1);animation:si 0.18s ease;}
  @keyframes si{from{opacity:0;transform:translateX(8px);}to{opacity:1;transform:none;}}
  .lr1{display:flex;justify-content:space-between;margin-bottom:2px;}
  .ln{font-size:0.61rem;color:var(--text);max-width:145px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:0.03em;}
  .lnum{font-size:0.54rem;color:var(--dim2);}
  .ldur{font-size:0.74rem;font-weight:700;color:var(--lc,var(--acc));letter-spacing:0.03em;}
  .lrng{font-size:0.53rem;color:var(--dim2);margin-top:1px;}
  .shd{padding:0.7rem 1rem;border-top:1px solid var(--b1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;font-size:0.53rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim2);}
  .shd button{background:none;border:none;font-family:'Times New Roman',Times,serif;font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim2);cursor:pointer;transition:color 0.12s;}
  .shd button:hover{color:var(--red);}
  .sess-list{max-height:165px;overflow-y:auto;padding:0.4rem 0.5rem;display:flex;flex-direction:column;gap:4px;}
  .sess-list::-webkit-scrollbar{width:2px;}
  .sess-list::-webkit-scrollbar-thumb{background:var(--b1);}
  .si{padding:6px 9px;border:1px solid var(--b1);cursor:pointer;transition:border-color 0.12s;}
  .si:hover{border-color:var(--b2);}
  .sr1{display:flex;justify-content:space-between;margin-bottom:2px;}
  .sdate{font-size:0.54rem;color:var(--dim);}
  .stot{font-size:0.6rem;font-weight:700;color:var(--acc);}
  .sdesc{font-size:0.52rem;color:var(--dim2);line-height:1.5;}
  .no-sess{font-size:0.54rem;color:var(--dim2);padding:0.5rem 0.3rem;letter-spacing:0.06em;}
  .ovl{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;display:flex;align-items:center;justify-content:center;}
  .modal{background:#0e0e0e;border:1px solid var(--b2);padding:1.75rem 2rem;width:350px;}
  .modal h3{font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text);margin-bottom:0.5rem;}
  .modal p{color:var(--dim);font-size:0.58rem;letter-spacing:0.06em;margin-bottom:1.1rem;}
  .modal p .m{color:var(--acc);}
  .modal input{width:100%;background:var(--s2);border:1px solid var(--b2);color:var(--text);font-family:'Times New Roman',Times,serif;font-size:0.65rem;padding:8px 11px;outline:none;margin-bottom:1rem;letter-spacing:0.04em;transition:border-color 0.12s;}
  .modal input:focus{border-color:var(--acc);}
  .modal input::placeholder{color:var(--dim2);}
  .macts{display:flex;gap:7px;justify-content:flex-end;}
  .modal.wide{width:460px;max-width:94vw;max-height:80vh;overflow-y:auto;}
  .sm-laps{margin-top:0.9rem;display:flex;flex-direction:column;gap:4px;}
  body.fs .side{display:none;}
  body.fs .app{grid-template-columns:1fr;}
  body.fs .tips{display:none;}
</style>
</head>
<body>
<div id="ascii-sky"></div>
<div class="app">
  <main class="main">
    <div class="mode-row">
      <button class="mbtn on" id="btn-sw" onclick="setMode('stopwatch')">stopwatch</button>
      <span class="mode-sep">/</span>
      <button class="mbtn" id="btn-cd" onclick="setMode('countdown')">countdown</button>
    </div>
    <div class="clock-wrap">
      <div class="clock paused" id="clock">
        <span id="seg-m">00</span><span class="sep">:</span><span id="seg-s">00</span>
      </div>
      <div class="ticker" id="ticker"></div>
    </div>
    <div class="controls">
      <button class="btn red" onclick="resetTimer()">[ reset ]</button>
      <button class="btn main" id="sbtn" onclick="toggleTimer()">[ start ]</button>
      <button class="btn lap-b" id="lbtn" onclick="triggerLap()" disabled>[ lap ]</button>
    </div>
    <div class="controls" style="margin-top:-0.5rem;">
      <button class="btn popout" id="popout-btn" onclick="toggleBowl()">&gt;ยบ)&gt; pop-out fishbowl</button>
    </div>
    <div class="tips">
      <span><span class="k">space</span> play/pause</span>
      <span><span class="k">L</span> lap</span>
      <span><span class="k">R</span> reset</span>
      <span><span class="k">โโ</span> ยฑ60s</span>
      <span><span class="k">F</span> fullscreen</span>
      <span><span class="k">P</span> pop-out</span>
    </div>
  </main>
  <aside class="side">
    <div class="phd"><span>// current session</span><button onclick="clearLaps()">clear</button></div>
    <div class="laps-list" id="laps-list">
      <div class="empty-msg">&gt; start the timer<br>&gt; press [lap] to<br>&nbsp;&nbsp;&nbsp;mark a block</div>
    </div>
    <div class="shd"><span>// past sessions</span><button onclick="clearSessions()">clear all</button></div>
    <div class="sess-list" id="sess-list"><div class="no-sess">&gt; no saved sessions</div></div>
  </aside>
</div>

<div class="ovl" id="lap-modal" style="display:none;">
  <div class="modal">
    <h3>// name this block</h3>
    <p>duration: <span class="m" id="mdur">โ</span></p>
    <input type="text" id="linput" placeholder="physics / chapter 5 / review ..." maxlength="40"/>
    <div class="macts">
      <button class="btn" onclick="cancelLap()">[ cancel ]</button>
      <button class="btn main" onclick="saveLap()">[ save ]</button>
    </div>
  </div>
</div>
<div class="ovl" id="sess-modal" style="display:none;">
  <div class="modal wide">
    <h3 id="smtitle">// session</h3>
    <p id="smsub"></p>
    <div class="sm-laps" id="smlaps"></div>
    <div class="macts" style="margin-top:1.1rem;"><button class="btn main" onclick="closeSM()">[ close ]</button></div>
  </div>
</div>

<script>
const LC=['#aaa','#888','#ccc','#666','#bbb','#999','#ddd','#777'];
let S={t:0,run:false,mode:'stopwatch',ls:0,laps:[],pend:null,startedAt:null};
let iv=null,wl=null,pipWin=null;
const BOWL_STATE_KEY='fishbowl_state';
const AUTOSAVE_KEY='study_autosave';

// โโ Bowl state sync โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
// Main page is the single source of truth.
// pushBowlState() writes current state every tick so the popup can read it.
// processCmd() reads commands the popup sends (start/pause/reset/lap).

const CMD_KEY = 'fishbowl_cmd';
let lastCmdTs = 0;

function pushBowlState(){
  try{
    localStorage.setItem(BOWL_STATE_KEY, JSON.stringify({
      t:      getCurrentT(),
      run:    S.run,
      mode:   S.mode,
      ls:     S.ls,
      laps:   S.laps,
      // startWall: absolute wall-clock ms when timer was started.
      // Popup derives exact elapsed time from this โ no drift.
      startWall: (S.run && S.startedAt !== null)
        ? Date.now() - (performance.now() - S.startedAt)
        : null
    }));
  }catch{}
}

// No longer needed (popup doesn't write state back), kept as no-op for safety
function pullBowlState(){}

function processCmd(){
  try{
    const raw = localStorage.getItem(CMD_KEY); if(!raw) return;
    const c = JSON.parse(raw);
    if(!c || c.ts <= lastCmdTs) return;   // already handled
    lastCmdTs = c.ts;
    switch(c.cmd){
      case 'start': if(!S.run) play();   break;
      case 'pause': if(S.run)  pause();  break;
      case 'reset': resetTimer();        break;
      case 'lap':
        if(!S.run || !c.payload) break;
        // payload already has {start, end, duration, name}
        const p = c.payload;
        S.laps.push({...p, ci: S.laps.length % LC.length});
        S.ls = p.end;
        renderLaps(); autosave(); pushBowlState();
        break;
    }
  }catch{}
}

// Poll for commands from popup every 200ms
setInterval(processCmd, 200);

// โโ Autosave โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
function todayStr(){const d=new Date();return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function autosave(){
  if(S.t<1&&!S.laps.length)return;
  try{localStorage.setItem(AUTOSAVE_KEY,JSON.stringify({date:todayStr(),t:S.t,mode:S.mode,ls:S.ls,laps:S.laps,wasRunning:S.run}));}catch{}
}
function loadAutosave(){
  try{const raw=localStorage.getItem(AUTOSAVE_KEY);if(!raw)return null;const saved=JSON.parse(raw);if(saved.date!==todayStr()){localStorage.removeItem(AUTOSAVE_KEY);return null;}return saved;}catch{return null;}
}
function clearAutosave(){localStorage.removeItem(AUTOSAVE_KEY);}

// โโ Helpers โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
const pad=n=>String(Math.floor(Math.abs(n))).padStart(2,'0');
const fmt=s=>`${pad(s/60)}:${pad(s%60)}`;
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function getCurrentT(){
  if(!S.run||S.startedAt===null)return S.t;
  const elapsed=(performance.now()-S.startedAt)/1000;
  return S.mode==='countdown'?Math.max(0,S.t-elapsed):S.t+elapsed;
}

// โโ Display โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
function updClock(){
  const t=Math.floor(getCurrentT());
  document.getElementById('seg-m').textContent=pad(t/60);
  document.getElementById('seg-s').textContent=pad(t%60);
  document.getElementById('clock').classList.toggle('paused',!S.run);
  const tk=document.getElementById('ticker');
  if(S.run){const e=getCurrentT()-S.ls;tk.innerHTML=`lap ${S.laps.length+1} &nbsp;<span class="t">${fmt(e)}</span>`;}
  else tk.textContent='';
}
function tick(){
  if(!S.run)return;
  if(S.mode==='countdown'&&getCurrentT()<=0){S.t=0;S.startedAt=null;pause();return;}
  updClock(); pushBowlState();
  if(Math.round(getCurrentT()*2)%10===0)autosave();
}

// โโ Play/Pause/Reset โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
function play(){
  if(S.run)return; S.run=true; S.startedAt=performance.now();
  iv=setInterval(tick,250);
  document.getElementById('sbtn').textContent='[ pause ]';
  document.getElementById('lbtn').disabled=false;
  reqWL(); updClock(); pushBowlState();
}
function pause(){
  if(!S.run&&S.startedAt===null)return;
  S.t=getCurrentT();S.startedAt=null;S.run=false;
  clearInterval(iv);iv=null;
  document.getElementById('sbtn').textContent='[ start ]';
  relWL();autosave();updClock();pushBowlState();
}
function toggleTimer(){S.run?pause():play();}
function resetTimer(){
  if(S.laps.length)saveSess(); pause();
  S.t=0;S.laps=[];S.ls=0;S.pend=null;S.startedAt=null;
  document.getElementById('lbtn').disabled=true;
  document.getElementById('lap-modal').style.display='none';
  clearAutosave();updClock();renderLaps();pushBowlState();
}
function setMode(m){
  S.mode=m;
  document.getElementById('btn-sw').classList.toggle('on',m==='stopwatch');
  document.getElementById('btn-cd').classList.toggle('on',m==='countdown');
  resetTimer();
}

// โโ Laps โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
function triggerLap(){
  if(!S.run)return; const now=getCurrentT(); const dur=now-S.ls; if(dur<1)return;
  S.pend={start:S.ls,end:now,duration:dur};
  document.getElementById('mdur').textContent=fmt(dur);
  document.getElementById('linput').value='';
  document.getElementById('lap-modal').style.display='flex';
  setTimeout(()=>document.getElementById('linput').focus(),40);
}
function saveLap(){
  const name=document.getElementById('linput').value.trim()||`block ${S.laps.length+1}`;
  S.laps.push({...S.pend,name,ci:S.laps.length%LC.length});
  S.ls=S.pend.end;S.pend=null;
  document.getElementById('lap-modal').style.display='none';
  autosave();renderLaps();pushBowlState();
}
function cancelLap(){S.pend=null;document.getElementById('lap-modal').style.display='none';}
function clearLaps(){
  if(!S.laps.length)return;
  if(confirm('clear current session?')){S.laps=[];S.ls=getCurrentT();autosave();renderLaps();pushBowlState();}
}
function lapHTML(l,i){const c=LC[l.ci];return`<div class="lap-item" style="--lc:${c}"><div class="lr1"><span class="ln">${esc(l.name)}</span><span class="lnum">#${i+1}</span></div><div class="ldur">${fmt(l.duration)}</div><div class="lrng">${fmt(l.start)} โ ${fmt(l.end)}</div></div>`;}
function renderLaps(){
  const el=document.getElementById('laps-list');
  if(!S.laps.length){el.innerHTML='<div class="empty-msg">&gt; start the timer<br>&gt; press [lap] to<br>&nbsp;&nbsp;&nbsp;mark a block</div>';return;}
  el.innerHTML=S.laps.map(lapHTML).join('');el.scrollTop=el.scrollHeight;
}

function getS(){try{return JSON.parse(localStorage.getItem('study_s')||'[]');}catch{return[];}}
function saveSess(){
  if(!S.laps.length)return; const all=getS();
  all.unshift({date:new Date().toISOString(),laps:S.laps,total:S.laps.reduce((a,l)=>a+l.duration,0)});
  localStorage.setItem('study_s',JSON.stringify(all.slice(0,50)));renderSess();
}
function clearSessions(){if(!confirm('delete all saved sessions?'))return;localStorage.removeItem('study_s');renderSess();}
function renderSess(){
  const el=document.getElementById('sess-list');const all=getS();
  if(!all.length){el.innerHTML='<div class="no-sess">&gt; no saved sessions</div>';return;}
  el.innerHTML=all.map((s,i)=>{const d=new Date(s.date);return`<div class="si" onclick="viewSess(${i})"><div class="sr1"><span class="sdate">${d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})} ${d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})}</span><span class="stot">${fmt(s.total)}</span></div><div class="sdesc">${s.laps.length} block${s.laps.length===1?'':'s'} ยท ${s.laps.map(l=>esc(l.name)).join(', ').substring(0,46)}</div></div>`;}).join('');
}
function viewSess(i){
  const s=getS()[i];if(!s)return; const d=new Date(s.date);
  document.getElementById('smtitle').textContent='// '+d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('smsub').textContent=d.toLocaleTimeString()+' ยท total: '+fmt(s.total);

}

// โโ Document Picture-in-Picture bowl โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
// Uses the Document PiP API โ always on top, no rectangular chrome, position is preserved by browser
const BOWL_W=440, BOWL_H=440;

function toggleBowl(){
  if(pipWin&&!pipWin.closed){pipWin.close();return;}
  openBowl();
}

async function openBowl(){
  // Prefer Document Picture-in-Picture (Chrome 116+) โ true shaped always-on-top window
  if('documentPictureInPicture' in window){
    try{
      pushBowlState();
      pipWin=await documentPictureInPicture.requestWindow({width:BOWL_W,height:BOWL_H});
      buildBowlInPip(pipWin);
      pipWin.addEventListener('pagehide',()=>{
        pipWin=null;
        document.getElementById('popout-btn').classList.remove('active');
        document.getElementById('popout-btn').textContent='>ยบ)> pop-out fishbowl';
        pullBowlState();
      });
      document.getElementById('popout-btn').classList.add('active');
      document.getElementById('popout-btn').textContent='>ยบ)> bowl is open ยท click to close';
      return;
    }catch(e){console.warn('PiP failed, falling back',e);}
  }
  // Fallback: window.open
  openBowlWindow();
}

function openBowlWindow(){
  pushBowlState();
  const sw=window.screen.availWidth, sh=window.screen.availHeight;
  const left=Math.max(0,sw-BOWL_W-20), top=Math.max(0,sh-BOWL_H-60);
  const win=window.open('bowl-popup.html','FishyBowl',
    `width=${BOWL_W},height=${BOWL_H},left=${left},top=${top},resizable=no,scrollbars=no,toolbar=no,menubar=no,location=no,status=no`);
  if(!win){showToast('> pop-ups blocked โ please allow pop-ups for this site');return;}
  pipWin=win;
  document.getElementById('popout-btn').classList.add('active');
  document.getElementById('popout-btn').textContent='>ยบ)> bowl is open ยท click to close';
  const chk=setInterval(()=>{
    if(!pipWin||pipWin.closed){
      clearInterval(chk);pipWin=null;
      document.getElementById('popout-btn').classList.remove('active');
      document.getElementById('popout-btn').textContent='>ยบ)> pop-out fishbowl';
      pullBowlState();
    }
  },500);
}

  const st=getState();

// โโ Keyboard โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
document.addEventListener('visibilitychange',()=>{if(!document.hidden)updClock();});
document.addEventListener('keydown',e=>{
  if(document.getElementById('lap-modal').style.display!=='none'){if(e.key==='Enter')saveLap();if(e.key==='Escape')cancelLap();return;}
  if(document.getElementById('sess-modal').style.display!=='none'){if(e.key==='Escape')closeSM();return;}
  switch(e.key){
    case ' ':e.preventDefault();toggleTimer();break;
    case 'l':case 'L':triggerLap();break;
    case 'r':case 'R':resetTimer();break;
    case 'f':case 'F':toggleFS();break;
    case 'p':case 'P':toggleBowl();break;
    case 'ArrowUp':e.preventDefault();if(S.run){S.t=getCurrentT();S.startedAt=performance.now();}S.t=Math.max(0,S.t+60);if(S.run)S.startedAt=performance.now();updClock();pushBowlState();break;
    case 'ArrowDown':e.preventDefault();if(S.run){S.t=getCurrentT();S.startedAt=performance.now();}S.t=Math.max(0,S.t-60);if(S.run)S.startedAt=performance.now();updClock();pushBowlState();break;
  }
});
document.getElementById('linput').addEventListener('keydown',e=>{if(e.key==='Enter')saveLap();});

// โโ Fullscreen / WakeLock โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
function toggleFS(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});document.body.classList.add('fs');}

}

// โโ ASCII fish background โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
const skyFish=[
  {l:[`><(((ยบ>`,`><((( >`],r:[`<ยบ)))><`,`< )))><`],size:'1rem',w:4},
  {l:[`>ยฐ)))><`,`>ยฐ)))-`],r:[`<(((ยฐ<`,`-(((ยฐ<`],size:'0.95rem',w:3},
  {l:[` *-*-*\n* ยบ  *-\n *-*-*`],r:[`  *-*-*\n-*  ยบ *\n  *-*-*`],size:'0.85rem',w:2},
  {l:[`  ยบ\\/\\/\\/\\--`,`  ยบ/\\/\\/\\--`],r:[`--/\\/\\/\\/ยบ`,`--\\/\\/\\ยบ`],size:'0.85rem',w:2},
  {l:[`>ยท(ยบ>`,`>=(ยบ>`],r:[`<ยบ)ยท<`,`<ยบ)=<`],size:'1rem',w:3},
  {l:[` o)>\n o)>  o)>`],r:[`<(o \n<(o  <(o`],size:'0.85rem',w:2},
  {l:[`     /\n___/  ยบ )----<\n   \\____/`],r:[`     \\\n>----( ยบ  \\___\n    \\____/`],size:'0.8rem',w:1},
  {l:[`  ___\n /  \\__\n|  ยบ  ==>`],r:[`    ___\n  __/  \\\n<==  ยบ  |`],size:'0.85rem',w:1},
];
const pool=[],entities=[];
skyFish.forEach((f,i)=>{for(let w=0;w<f.w;w++)pool.push(i);});
function spawnFish(){
  const el=document.createElement('div');el.className='ascii-entity';
  const fromRight=Math.random()>.5;
  const spec=skyFish[pool[Math.floor(Math.random()*pool.length)]];
  const frames=fromRight?spec.r:spec.l;
  el.textContent=frames[0];el.style.fontSize=spec.size;
  el.style.opacity=(Math.random()*.3+0.35).toFixed(2);
  const y=Math.random()*88+2;const speed=Math.random()*.9+0.25;let x=fromRight?110:-20;
  el.style.top=y+'vh';el.style.left=x+'vw';
  document.getElementById('ascii-sky').appendChild(el);
  let fi=0;
  const wig=setInterval(()=>{if(!el.isConnected){clearInterval(wig);return;}fi=(fi+1)%frames.length;el.textContent=frames[fi];},350+Math.random()*400);
  return{el,x,y,speed,dir:fromRight?-1:1,wave:Math.random()*Math.PI*2,waveAmp:Math.random()*1.2+0.4,wig};
}
for(let i=0;i<12;i++){const e=spawnFish();e.x=Math.random()*100;entities.push(e);}
let frame=0;
(function anim(){
  frame++;
  if(frame%110===0&&Math.random()>.35)entities.push(spawnFish());
  if(frame%150===0&&Math.random()>.45)entities.push(spawnFish());
  for(let i=entities.length-1;i>=0;i--){
    const e=entities[i];e.x+=e.speed*e.dir*0.1;
    const yo=Math.sin(frame*0.025+e.wave)*e.waveAmp;
    e.el.style.left=e.x+'vw';e.el.style.top=(e.y+yo)+'vh';
    if((e.dir===-1&&e.x<-25)||(e.dir===1&&e.x>118)){clearInterval(e.wig);e.el.remove();entities.splice(i,1);}
  }
  requestAnimationFrame(anim);
})();

// โโ Toast โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText=`position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid rgba(255,255,255,0.15);color:#ccc;font-family:'Times New Roman',Times,serif;font-size:0.62rem;letter-spacing:0.08em;padding:8px 18px;z-index:200;opacity:0;transition:opacity 0.3s;`;document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._tid);t._tid=setTimeout(()=>{t.style.opacity='0';},3500);
}

window.addEventListener('beforeunload',()=>{autosave();pushBowlState();});
(function init(){
  const saved=loadAutosave();
  if(saved){
    S.t=saved.t??0;S.ls=saved.ls??0;S.laps=saved.laps??[];S.mode=saved.mode??'stopwatch';S.run=false;
    document.getElementById('btn-sw').classList.toggle('on',S.mode==='stopwatch');
    document.getElementById('btn-cd').classList.toggle('on',S.mode==='countdown');
    if(S.t>0)document.getElementById('lbtn').disabled=false;
    showToast(saved.wasRunning?`> session restored (was running at ${fmt(saved.t)}) โ press start to continue`:`> session restored at ${fmt(saved.t)}`);
  }
  pushBowlState();updClock();renderLaps();renderSess();
})();
