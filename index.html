<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fishyyyyyy Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

  :root {
    --bg:   #080808;
    --s1:   rgba(255,255,255,0.03);
    --s2:   rgba(255,255,255,0.06);
    --b1:   rgba(255,255,255,0.08);
    --b2:   rgba(255,255,255,0.16);
    --text: #d0d0d0;
    --dim:  #555;
    --dim2: #333;
    --acc:  #999;
    --acc2: #777;
    --red:  #b53030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Times New Roman', Times, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #ascii-sky {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .ascii-entity {
    position: absolute;
    color: rgba(210,210,210,0.6);
    font-family: 'Courier New', Courier, monospace;
    white-space: pre;
    line-height: 1.2;
    pointer-events: none;
    user-select: none;
  }

  .app {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 310px;
    min-height: 100vh;
  }

  .main {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem; gap: 2rem;
  }

  .mode-row {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--dim2);
  }
  .mode-sep { color: var(--dim2); }
  .mbtn {
    background: none; border: none;
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--dim); cursor: pointer; padding: 2px 6px;
    transition: color 0.12s;
  }
  .mbtn:hover { color: var(--acc); }
  .mbtn.on { color: var(--text); text-decoration: underline; text-underline-offset: 4px; }

  .clock-wrap { text-align: center; }
  .clock {
    font-family: 'Times New Roman', Times, serif;
    font-size: clamp(4.5rem, 16vw, 11rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
  }
  .clock .sep { color: var(--dim); animation: blink 1s step-end infinite; }
  .clock.paused .sep { animation: none; opacity: 0.25; }
  @keyframes blink { 50% { opacity: 0.12; } }

  .ticker {
    font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--dim); margin-top: 0.65rem; height: 15px;
  }
  .ticker .t { color: var(--acc); }

  .controls { display: flex; gap: 8px; align-items: center; }
  .btn {
    background: none;
    border: 1px solid var(--b1);
    color: var(--dim);
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 7px 16px; cursor: pointer; transition: all 0.12s;
  }
  .btn:hover { border-color: var(--b2); color: var(--acc); }
  .btn:active { opacity: 0.5; }
  .btn.main { border-color: var(--acc2); color: var(--text); padding: 8px 26px; font-size: 0.65rem; }
  .btn.main:hover { border-color: var(--text); }
  .btn.lap-b { border-color: var(--b2); color: var(--acc2); }
  .btn.lap-b:disabled { opacity: 0.18; cursor: not-allowed; }
  .btn.red:hover { border-color: var(--red); color: var(--red); }

  .tips {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    font-size: 0.56rem; color: var(--dim2); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .k { border: 1px solid var(--dim2); padding: 1px 4px; font-size: 0.53rem; }

  .side {
    border-left: 1px solid var(--b1);
    background: var(--s1);
    display: flex; flex-direction: column; overflow: hidden;
    font-size: 0.6rem;
  }
  .phd {
    padding: 0.9rem 1rem;
    border-bottom: 1px solid var(--b1);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.56rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--dim2);
  }
  .phd button {
    background: none; border: none;
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.53rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--dim2); cursor: pointer; transition: color 0.12s;
  }
  .phd button:hover { color: var(--red); }

  .laps-list {
    flex: 1; overflow-y: auto;
    padding: 0.5rem; display: flex; flex-direction: column; gap: 4px;
  }
  .laps-list::-webkit-scrollbar { width: 2px; }
  .laps-list::-webkit-scrollbar-thumb { background: var(--b1); }

  .empty-msg { color: var(--dim2); font-size: 0.56rem; line-height: 2; padding: 0.3rem 0.3rem; letter-spacing: 0.06em; }

  .lap-item {
    border-left: 2px solid var(--lc, var(--dim));
    padding: 6px 10px;
    background: var(--s1);
    animation: si 0.18s ease;
  }
  @keyframes si { from { opacity:0; transform:translateX(8px); } to { opacity:1; transform:none; } }
  .lr1 { display: flex; justify-content: space-between; margin-bottom: 2px; }
  .ln {
    font-size: 0.61rem; color: var(--text);
    max-width: 145px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    letter-spacing: 0.03em;
  }
  .lnum { font-size: 0.54rem; color: var(--dim2); }
  .ldur { font-size: 0.74rem; font-weight: 700; color: var(--lc, var(--acc)); letter-spacing: 0.03em; }
  .lrng { font-size: 0.53rem; color: var(--dim2); margin-top: 1px; }

  .shd {
    padding: 0.7rem 1rem;
    border-top: 1px solid var(--b1); border-bottom: 1px solid var(--b1);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.53rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--dim2);
  }
  .shd button {
    background: none; border: none;
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--dim2); cursor: pointer; transition: color 0.12s;
  }
  .shd button:hover { color: var(--red); }
  .sess-list {
    max-height: 165px; overflow-y: auto;
    padding: 0.4rem 0.5rem; display: flex; flex-direction: column; gap: 4px;
  }
  .sess-list::-webkit-scrollbar { width: 2px; }
  .sess-list::-webkit-scrollbar-thumb { background: var(--b1); }
  .si {
    padding: 6px 9px; border: 1px solid var(--b1); cursor: pointer; transition: border-color 0.12s;
  }
  .si:hover { border-color: var(--b2); }
  .sr1 { display: flex; justify-content: space-between; margin-bottom: 2px; }
  .sdate { font-size: 0.54rem; color: var(--dim); }
  .stot  { font-size: 0.6rem; font-weight: 700; color: var(--acc); }
  .sdesc { font-size: 0.52rem; color: var(--dim2); line-height: 1.5; }
  .no-sess { font-size: 0.54rem; color: var(--dim2); padding: 0.5rem 0.3rem; letter-spacing: 0.06em; }

  .ovl {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100; display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: #0e0e0e; border: 1px solid var(--b2);
    padding: 1.75rem 2rem; width: 350px;
  }
  .modal h3 {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text); margin-bottom: 0.5rem;
  }
  .modal p { color: var(--dim); font-size: 0.58rem; letter-spacing: 0.06em; margin-bottom: 1.1rem; }
  .modal p .m { color: var(--acc); }
  .modal input {
    width: 100%; background: var(--s2); border: 1px solid var(--b2);
    color: var(--text); font-family: 'Times New Roman', Times, serif;
    font-size: 0.65rem; padding: 8px 11px; outline: none; margin-bottom: 1rem;
    letter-spacing: 0.04em; transition: border-color 0.12s;
  }
  .modal input:focus { border-color: var(--acc); }
  .modal input::placeholder { color: var(--dim2); }
  .macts { display: flex; gap: 7px; justify-content: flex-end; }
  .modal.wide { width: 460px; max-width: 94vw; max-height: 80vh; overflow-y: auto; }
  .sm-laps { margin-top: 0.9rem; display: flex; flex-direction: column; gap: 4px; }

  body.fs .side { display: none; }
  body.fs .app  { grid-template-columns: 1fr; }
  body.fs .tips { display: none; }

  /* ── Fishbowl popup button ── */
  .popout-btn {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    z-index: 90;
    background: none;
    border: 1px solid var(--b2);
    color: var(--dim);
    font-family: 'Courier New', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    padding: 7px 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .popout-btn:hover { border-color: var(--acc); color: var(--acc); }

  /* ── Fishbowl popup ── */
  #fishbowl-popup {
    position: fixed;
    z-index: 9999;
    /* pinned — not buried under anything */
    display: none;
    touch-action: none;
  }

  .bowl-outer {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* SVG circle bowl */
  .bowl-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* Clip circle for contents */
  .bowl-clip {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    /* opacity transitions on hover handled via JS */
    transition: background 0.35s;
  }

  .bowl-inner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Fish swimming inside the bowl */
  #bowl-fish-sky {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 50%;
  }
  .bowl-fish-entity {
    position: absolute;
    color: rgba(180,180,180,0.55);
    font-family: 'Courier New', monospace;
    white-space: pre;
    line-height: 1.2;
    pointer-events: none;
    user-select: none;
    font-size: 0.55rem;
  }

  .bowl-clock {
    font-family: 'Times New Roman', Times, serif;
    font-size: clamp(1.4rem, 5vw, 2.4rem);
    font-weight: 700;
    color: #c8c8c8;
    letter-spacing: -0.02em;
    line-height: 1;
    position: relative;
    z-index: 2;
    text-align: center;
  }
  .bowl-clock .sep { color: #444; animation: blink 1s step-end infinite; }
  .bowl-clock.paused .sep { animation: none; opacity: 0.2; }

  .bowl-label {
    font-size: 0.42rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
    margin-top: 5px;
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .bowl-ticker {
    font-family: 'Courier New', monospace;
    font-size: 0.38rem;
    letter-spacing: 0.08em;
    color: #555;
    margin-top: 3px;
    position: relative;
    z-index: 2;
  }
  .bowl-ticker .bt { color: #888; }

  .bowl-btns {
    display: flex;
    gap: 5px;
    margin-top: 10px;
    position: relative;
    z-index: 2;
  }
  .bowl-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    color: #555;
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.38rem;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .bowl-btn:hover { border-color: rgba(255,255,255,0.25); color: #999; }
  .bowl-btn.bp { border-color: rgba(255,255,255,0.18); color: #aaa; }

  /* close X in top-right corner of screen */
  #bowl-close {
    position: fixed;
    top: 1rem; right: 1rem;
    z-index: 10001;
    background: rgba(8,8,8,0.9);
    border: 1px solid var(--b2);
    color: var(--dim);
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    width: 28px; height: 28px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s;
    line-height: 1;
  }
  #bowl-close:hover { border-color: var(--acc); color: var(--acc); }

  /* resize handle ring */
  .bowl-resize-ring {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    cursor: nwse-resize;
    pointer-events: none;
    border: 2px dashed transparent;
    transition: border-color 0.2s;
  }
  #fishbowl-popup:hover .bowl-resize-ring {
    border-color: rgba(255,255,255,0.07);
    pointer-events: all;
  }

  /* bubble decorations */
  .bowl-bubbles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(200,200,200,0.08);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scale(1); opacity: 0.5; }
    100% { transform: translateY(-120px) scale(1.4); opacity: 0; }
  }
</style>
</head>
<body>

<div id="ascii-sky"></div>

<div class="app">
  <main class="main">

    <div class="mode-row">
      <button class="mbtn on" id="btn-sw" onclick="setMode('stopwatch')">stopwatch</button>
      <span class="mode-sep">/</span>
      <button class="mbtn" id="btn-cd" onclick="setMode('countdown')">countdown</button>
    </div>

    <div class="clock-wrap">
      <div class="clock paused" id="clock">
        <span id="seg-m">00</span><span class="sep">:</span><span id="seg-s">00</span>
      </div>
      <div class="ticker" id="ticker"></div>
    </div>

    <div class="controls">
      <button class="btn red" onclick="resetTimer()">[ reset ]</button>
      <button class="btn main" id="sbtn" onclick="toggleTimer()">[ start ]</button>
      <button class="btn lap-b" id="lbtn" onclick="triggerLap()" disabled>[ lap ]</button>
    </div>

    <div class="tips">
      <span><span class="k">space</span> play/pause</span>
      <span><span class="k">L</span> lap</span>
      <span><span class="k">R</span> reset</span>
      <span><span class="k">↑↓</span> ±60s</span>
      <span><span class="k">F</span> fullscreen</span>
      <span><span class="k">P</span> fishbowl</span>
    </div>

  </main>

  <aside class="side">
    <div class="phd">
      <span>// current session</span>
      <button onclick="clearLaps()">clear</button>
    </div>
    <div class="laps-list" id="laps-list">
      <div class="empty-msg">&gt; start the timer<br>&gt; press [lap] to<br>&nbsp;&nbsp;&nbsp;mark a block</div>
    </div>
    <div class="shd">
      <span>// past sessions</span>
      <button onclick="clearSessions()">clear all</button>
    </div>
    <div class="sess-list" id="sess-list">
      <div class="no-sess">&gt; no saved sessions</div>
    </div>
  </aside>
</div>

<!-- popout button -->
<button class="popout-btn" onclick="openBowl()" title="open fishbowl popup (P)">
  &gt;º)&gt; pop-out
</button>

<!-- close button (fixed top-right, shown when bowl open) -->
<div id="bowl-close" onclick="closeBowl()">✕</div>

<!-- Fishbowl popup -->
<div id="fishbowl-popup">
  <div class="bowl-outer">
    <!-- SVG rim/glass -->
    <svg class="bowl-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="rimGrad" cx="35%" cy="30%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
          <stop offset="60%" stop-color="rgba(255,255,255,0.01)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
        </radialGradient>
        <radialGradient id="shineGrad" cx="30%" cy="25%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>
      <!-- outer glass rim -->
      <circle cx="110" cy="110" r="107" fill="none" stroke="rgba(200,200,200,0.13)" stroke-width="1.5"/>
      <!-- inner glass sheen -->
      <circle cx="110" cy="110" r="104" fill="url(#rimGrad)"/>
      <!-- highlight shine -->
      <ellipse cx="78" cy="68" rx="28" ry="18" fill="url(#shineGrad)" transform="rotate(-25 78 68)"/>
      <!-- ASCII bowl text around rim (top arc) -->
      <path id="rimArc" d="M 25,110 A 85,85 0 0,1 195,110" fill="none"/>
      <text font-family="'Courier New',monospace" font-size="6" fill="rgba(80,80,80,0.6)" letter-spacing="2">
        <textPath href="#rimArc" startOffset="5%">~·~·~·~·~·~·~·~·~·~·~·~·~·~·~·~·~·~·</textPath>
      </text>
      <!-- base stand / pedestal hint -->
      <ellipse cx="110" cy="214" rx="28" ry="5" fill="rgba(255,255,255,0.03)"/>
      <line x1="96" y1="212" x2="110" y2="217" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="124" y1="212" x2="110" y2="217" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </svg>

    <!-- clipped inner contents -->
    <div class="bowl-clip" id="bowl-clip" style="inset: 3px;">
      <div class="bowl-inner">
        <!-- bubbles -->
        <div class="bowl-bubbles" id="bowl-bubbles"></div>
        <!-- fish layer -->
        <div id="bowl-fish-sky"></div>

        <!-- timer display -->
        <div class="bowl-clock paused" id="bowl-clock">
          <span id="bseg-m">00</span><span class="sep">:</span><span id="bseg-s">00</span>
        </div>
        <div class="bowl-label" id="bowl-label">// stopwatch</div>
        <div class="bowl-ticker" id="bowl-ticker"></div>
        <div class="bowl-btns">
          <button class="bowl-btn" onclick="resetTimer(); return false;">[ rst ]</button>
          <button class="bowl-btn bp" id="bowl-sbtn" onclick="toggleTimer(); return false;">[ start ]</button>
          <button class="bowl-btn" id="bowl-lbtn" onclick="triggerLap(); return false;" disabled>[ lap ]</button>
        </div>
      </div>
    </div>

    <!-- resize ring (hover to reveal, drag corner) -->
    <div class="bowl-resize-ring" id="bowl-resize-ring"></div>
  </div>
</div>

<!-- lap naming modal -->
<div class="ovl" id="lap-modal" style="display:none;">
  <div class="modal">
    <h3>// name this block</h3>
    <p>duration: <span class="m" id="mdur">—</span></p>
    <input type="text" id="linput" placeholder="physics / chapter 5 / review ..." maxlength="40"/>
    <div class="macts">
      <button class="btn" onclick="cancelLap()">[ cancel ]</button>
      <button class="btn main" onclick="saveLap()">[ save ]</button>
    </div>
  </div>
</div>

<!-- session view modal -->
<div class="ovl" id="sess-modal" style="display:none;">
  <div class="modal wide">
    <h3 id="smtitle">// session</h3>
    <p id="smsub"></p>
    <div class="sm-laps" id="smlaps"></div>
    <div class="macts" style="margin-top:1.1rem;">
      <button class="btn main" onclick="closeSM()">[ close ]</button>
    </div>
  </div>
</div>

<script>
// lap colors — all grey tones, no blue
const LC = ['#aaa','#888','#ccc','#666','#bbb','#999','#ddd','#777'];

// ── State ─────────────────────────────────────────────────────────────────────
let S = { t:0, run:false, mode:'stopwatch', ls:0, laps:[], pend:null, startedAt:null };
let iv = null, wl = null;

// ── Autosave ──────────────────────────────────────────────────────────────────
const AUTOSAVE_KEY = 'study_autosave';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

function autosave() {
  if (S.t < 1 && !S.laps.length) return;
  try {
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({
      date: todayStr(), t: S.t, mode: S.mode, ls: S.ls, laps: S.laps, wasRunning: S.run
    }));
  } catch {}
}

function loadAutosave() {
  try {
    const raw = localStorage.getItem(AUTOSAVE_KEY);
    if (!raw) return null;
    const saved = JSON.parse(raw);
    if (saved.date !== todayStr()) { localStorage.removeItem(AUTOSAVE_KEY); return null; }
    return saved;
  } catch { return null; }
}

function clearAutosave() { localStorage.removeItem(AUTOSAVE_KEY); }

// ── Helpers ───────────────────────────────────────────────────────────────────
const pad = n => String(Math.floor(Math.abs(n))).padStart(2, '0');
const fmt = s => `${pad(s / 60)}:${pad(s % 60)}`;
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function getCurrentT() {
  if (!S.run || S.startedAt === null) return S.t;
  const elapsed = (performance.now() - S.startedAt) / 1000;
  return S.mode === 'countdown' ? Math.max(0, S.t - elapsed) : S.t + elapsed;
}

// ── Display ───────────────────────────────────────────────────────────────────
function updClock() {
  const t = Math.floor(getCurrentT());
  // main clock
  document.getElementById('seg-m').textContent = pad(t / 60);
  document.getElementById('seg-s').textContent = pad(t % 60);
  document.getElementById('clock').classList.toggle('paused', !S.run);
  const tk = document.getElementById('ticker');
  if (S.run) {
    const e = getCurrentT() - S.ls;
    tk.innerHTML = `lap ${S.laps.length + 1} &nbsp;<span class="t">${fmt(e)}</span>`;
  } else {
    tk.textContent = '';
  }
  // bowl clock (always synced)
  updBowlClock();
}

function updBowlClock() {
  const t = Math.floor(getCurrentT());
  const bm = document.getElementById('bseg-m');
  const bs = document.getElementById('bseg-s');
  if (bm) bm.textContent = pad(t / 60);
  if (bs) bs.textContent = pad(t % 60);
  const bc = document.getElementById('bowl-clock');
  if (bc) bc.classList.toggle('paused', !S.run);
  const bl = document.getElementById('bowl-label');
  if (bl) bl.textContent = `// ${S.mode}`;
  const btk = document.getElementById('bowl-ticker');
  if (btk) {
    if (S.run) {
      const e = getCurrentT() - S.ls;
      btk.innerHTML = `lap ${S.laps.length + 1} <span class="bt">${fmt(e)}</span>`;
    } else {
      btk.textContent = '';
    }
  }
  const bsBtn = document.getElementById('bowl-sbtn');
  if (bsBtn) bsBtn.textContent = S.run ? '[ pause ]' : '[ start ]';
  const blBtn = document.getElementById('bowl-lbtn');
  if (blBtn) blBtn.disabled = !S.run;
}

function tick() {
  if (!S.run) return;
  if (S.mode === 'countdown' && getCurrentT() <= 0) {
    S.t = 0; S.startedAt = null;
    pause(); return;
  }
  updClock();
  if (Math.round(getCurrentT() * 2) % 10 === 0) autosave();
}

// ── Play / Pause / Reset ──────────────────────────────────────────────────────
function play() {
  if (S.run) return;
  S.run = true;
  S.startedAt = performance.now();
  iv = setInterval(tick, 250);
  document.getElementById('sbtn').textContent = '[ pause ]';
  document.getElementById('lbtn').disabled = false;
  reqWL(); updClock();
}

function pause() {
  if (!S.run && S.startedAt === null) return;
  S.t = getCurrentT();
  S.startedAt = null;
  S.run = false;
  clearInterval(iv); iv = null;
  document.getElementById('sbtn').textContent = '[ start ]';
  relWL(); autosave(); updClock();
}

function toggleTimer() { S.run ? pause() : play(); }

function resetTimer() {
  if (S.laps.length) saveSess();
  pause();
  S.t = 0; S.laps = []; S.ls = 0; S.pend = null; S.startedAt = null;
  document.getElementById('lbtn').disabled = true;
  document.getElementById('lap-modal').style.display = 'none';
  clearAutosave();
  updClock(); renderLaps();
}

function setMode(m) {
  S.mode = m;
  document.getElementById('btn-sw').classList.toggle('on', m === 'stopwatch');
  document.getElementById('btn-cd').classList.toggle('on', m === 'countdown');
  resetTimer();
}

// ── Laps ──────────────────────────────────────────────────────────────────────
function triggerLap() {
  if (!S.run) return;
  const now = getCurrentT();
  const dur = now - S.ls;
  if (dur < 1) return;
  S.pend = { start: S.ls, end: now, duration: dur };
  document.getElementById('mdur').textContent = fmt(dur);
  document.getElementById('linput').value = '';
  document.getElementById('lap-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('linput').focus(), 40);
}

function saveLap() {
  const name = document.getElementById('linput').value.trim() || `block ${S.laps.length + 1}`;
  S.laps.push({ ...S.pend, name, ci: S.laps.length % LC.length });
  S.ls = S.pend.end; S.pend = null;
  document.getElementById('lap-modal').style.display = 'none';
  autosave(); renderLaps();
}

function cancelLap() { S.pend = null; document.getElementById('lap-modal').style.display = 'none'; }

function clearLaps() {
  if (!S.laps.length) return;
  if (confirm('clear current session?')) {
    S.laps = []; S.ls = getCurrentT(); autosave(); renderLaps();
  }
}

function lapHTML(l, i) {
  const c = LC[l.ci];
  return `<div class="lap-item" style="--lc:${c}">
    <div class="lr1"><span class="ln">${esc(l.name)}</span><span class="lnum">#${i+1}</span></div>
    <div class="ldur">${fmt(l.duration)}</div>
    <div class="lrng">${fmt(l.start)} → ${fmt(l.end)}</div>
  </div>`;
}

function renderLaps() {
  const el = document.getElementById('laps-list');
  if (!S.laps.length) {
    el.innerHTML = '<div class="empty-msg">&gt; start the timer<br>&gt; press [lap] to<br>&nbsp;&nbsp;&nbsp;mark a block</div>';
    return;
  }
  el.innerHTML = S.laps.map(lapHTML).join('');
  el.scrollTop = el.scrollHeight;
}

// ── Sessions ──────────────────────────────────────────────────────────────────
function getS() { try { return JSON.parse(localStorage.getItem('study_s') || '[]'); } catch { return []; } }

function saveSess() {
  if (!S.laps.length) return;
  const all = getS();
  all.unshift({ date: new Date().toISOString(), laps: S.laps, total: S.laps.reduce((a,l) => a+l.duration, 0) });
  localStorage.setItem('study_s', JSON.stringify(all.slice(0, 50)));
  renderSess();
}

function clearSessions() {
  if (!confirm('delete all saved sessions?')) return;
  localStorage.removeItem('study_s'); renderSess();
}

function renderSess() {
  const el = document.getElementById('sess-list');
  const all = getS();
  if (!all.length) { el.innerHTML = '<div class="no-sess">&gt; no saved sessions</div>'; return; }
  el.innerHTML = all.map((s,i) => {
    const d = new Date(s.date);
    return `<div class="si" onclick="viewSess(${i})">
      <div class="sr1">
        <span class="sdate">${d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})} ${d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})}</span>
        <span class="stot">${fmt(s.total)}</span>
      </div>
      <div class="sdesc">${s.laps.length} block${s.laps.length===1?'':'s'} · ${s.laps.map(l=>esc(l.name)).join(', ').substring(0,46)}</div>
    </div>`;
  }).join('');
}

function viewSess(i) {
  const s = getS()[i]; if (!s) return;
  const d = new Date(s.date);
  document.getElementById('smtitle').textContent = '// ' + d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('smsub').textContent = d.toLocaleTimeString() + ' · total: ' + fmt(s.total);
  document.getElementById('smlaps').innerHTML = s.laps.map(lapHTML).join('');
  document.getElementById('sess-modal').style.display = 'flex';
}

function closeSM() { document.getElementById('sess-modal').style.display = 'none'; }

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('visibilitychange', () => { if (!document.hidden) updClock(); });

document.addEventListener('keydown', e => {
  if (document.getElementById('lap-modal').style.display !== 'none') {
    if (e.key === 'Enter') saveLap();
    if (e.key === 'Escape') cancelLap();
    return;
  }
  if (document.getElementById('sess-modal').style.display !== 'none') {
    if (e.key === 'Escape') closeSM(); return;
  }
  switch(e.key) {
    case ' ': e.preventDefault(); toggleTimer(); break;
    case 'l': case 'L': triggerLap(); break;
    case 'r': case 'R': resetTimer(); break;
    case 'f': case 'F': toggleFS(); break;
    case 'p': case 'P': bowlVisible ? closeBowl() : openBowl(); break;
    case 'ArrowUp':
      e.preventDefault();
      if (S.run) { S.t = getCurrentT(); S.startedAt = performance.now(); }
      S.t = Math.max(0, S.t + 60);
      if (S.run) S.startedAt = performance.now();
      updClock(); break;
    case 'ArrowDown':
      e.preventDefault();
      if (S.run) { S.t = getCurrentT(); S.startedAt = performance.now(); }
      S.t = Math.max(0, S.t - 60);
      if (S.run) S.startedAt = performance.now();
      updClock(); break;
  }
});

document.getElementById('linput').addEventListener('keydown', e => { if (e.key === 'Enter') saveLap(); });

// ── Fullscreen / Wake lock ────────────────────────────────────────────────────
function toggleFS() {
  if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(()=>{}); document.body.classList.add('fs'); }
  else { document.exitFullscreen().catch(()=>{}); document.body.classList.remove('fs'); }
}
async function reqWL() { try { if ('wakeLock' in navigator) wl = await navigator.wakeLock.request('screen'); } catch {} }
function relWL() { if (wl) { wl.release(); wl = null; } }

// ── ASCII fish (background) ───────────────────────────────────────────────────
const skyFish = [
  { l:[`><(((º>`,`><((( >`], r:[`<º)))><`,`< )))><`], size:'1rem',   w:4 },
  { l:[`>°)))><`,`>°)))-`], r:[`<(((°<`,`-(((°<`],   size:'0.95rem', w:3 },
  { l:[` *-*-*\n* º  *-\n *-*-*`], r:[`  *-*-*\n-*  º *\n  *-*-*`], size:'0.85rem', w:2 },
  { l:[`  º\\/\\/\\/\\--`,`  º/\\/\\/\\--`], r:[`--/\\/\\/\\/º`,`--\\/\\/\\º`], size:'0.85rem', w:2 },
  { l:[`>·(º>`,`>=(º>`], r:[`<º)·<`,`<º)=<`],         size:'1rem',   w:3 },
  { l:[` o)>\n o)>  o)>`], r:[`<(o \n<(o  <(o`],       size:'0.85rem', w:2 },
  { l:[`     /\n___/  º )----<\n   \\____/`], r:[`     \\\n>----( º  \\___\n    \\____/`], size:'0.8rem', w:1 },
  { l:[`  ___\n /  \\__\n|  º  ==>`], r:[`    ___\n  __/  \\\n<==  º  |`], size:'0.85rem', w:1 },
];

const pool = [], entities = [];
skyFish.forEach((f,i) => { for (let w=0; w<f.w; w++) pool.push(i); });

function spawnFish() {
  const el = document.createElement('div');
  el.className = 'ascii-entity';
  const fromRight = Math.random() > .5;
  const spec = skyFish[pool[Math.floor(Math.random()*pool.length)]];
  const frames = fromRight ? spec.r : spec.l;
  el.textContent = frames[0];
  el.style.fontSize = spec.size;
  el.style.opacity = (Math.random()*.3+0.35).toFixed(2);
  const y = Math.random()*88+2;
  const speed = Math.random()*.9+0.25;
  let x = fromRight ? 110 : -20;
  el.style.top = y+'vh'; el.style.left = x+'vw';
  document.getElementById('ascii-sky').appendChild(el);
  let fi = 0;
  const wig = setInterval(() => {
    if (!el.isConnected) { clearInterval(wig); return; }
    fi = (fi+1) % frames.length; el.textContent = frames[fi];
  }, 350+Math.random()*400);
  return { el, x, y, speed, dir: fromRight?-1:1, wave: Math.random()*Math.PI*2, waveAmp: Math.random()*1.2+0.4, wig };
}

for (let i=0; i<12; i++) { const e = spawnFish(); e.x = Math.random()*100; entities.push(e); }

let frame = 0;
(function anim() {
  frame++;
  if (frame%110===0 && Math.random()>.35) entities.push(spawnFish());
  if (frame%150===0 && Math.random()>.45) entities.push(spawnFish());
  for (let i=entities.length-1; i>=0; i--) {
    const e = entities[i];
    e.x += e.speed * e.dir * 0.1;
    const yo = Math.sin(frame*0.025+e.wave) * e.waveAmp;
    e.el.style.left = e.x+'vw'; e.el.style.top = (e.y+yo)+'vh';
    if ((e.dir===-1 && e.x<-25) || (e.dir===1 && e.x>118)) { clearInterval(e.wig); e.el.remove(); entities.splice(i,1); }
  }
  requestAnimationFrame(anim);
})();

// ── Bowl fish (unique designs for the popup) ──────────────────────────────────
// Different variety set from main background
const bowlFishVariants = [
  { l:[`~°>`,`~º>`], r:[`<°~`,`<º~`] },
  { l:[`><>`,`>(>`], r:[`<><`,`<)>`] },
  { l:[`-°))>`,`-º))>`], r:[`<((<`,`<((º-`] },
  { l:[`*><*`,`*>(*`], r:[`*<>*`,`*)<*`] },
  { l:[`ø>>`,`ø->`], r:[`<<ø`,`<-ø`] },
  { l:[`·:·>`,`·:·-`], r:[`<·:·`,`-·:·`] },
  { l:[`|º>|`,`|°>|`], r:[`|<º|`,`|<°|`] },
  { l:[`»°>`,`»º>`], r:[`<°«`,`<º«`] },
  { l:[`~·(>`,`~·[>`], r:[`<)·~`,`<]·~`] },
  { l:[`O><`,`O-<`], r:[`><O`,`>-O`] },
];

const bowlEntities = [];
let bowlFrame = 0;
let bowlAnimId = null;

function spawnBowlFish() {
  const container = document.getElementById('bowl-fish-sky');
  if (!container) return null;
  const popup = document.getElementById('fishbowl-popup');
  const size = parseInt(popup.style.width) || 220;
  const el = document.createElement('div');
  el.className = 'bowl-fish-entity';
  const fromRight = Math.random() > .5;
  const spec = bowlFishVariants[Math.floor(Math.random() * bowlFishVariants.length)];
  const frames = fromRight ? spec.r : spec.l;
  el.textContent = frames[0];
  // position within the circular bowl — keep vertically centered-ish area
  const yPct = Math.random() * 60 + 20; // 20%-80% vertical
  const speed = Math.random() * 0.5 + 0.15;
  let xPct = fromRight ? 105 : -15;
  el.style.top = yPct + '%';
  el.style.left = xPct + '%';
  el.style.fontSize = `${Math.random() * 0.12 + 0.32}rem`;
  el.style.opacity = (Math.random() * 0.3 + 0.25).toFixed(2);
  container.appendChild(el);
  let fi = 0;
  const wig = setInterval(() => {
    if (!el.isConnected) { clearInterval(wig); return; }
    fi = (fi + 1) % frames.length;
    el.textContent = frames[fi];
  }, 400 + Math.random() * 500);
  return { el, xPct, yPct, speed, dir: fromRight ? -1 : 1, wave: Math.random() * Math.PI * 2, waveAmp: Math.random() * 1.5 + 0.5, wig };
}

function startBowlAnim() {
  if (bowlAnimId) return;
  // seed a few fish immediately
  for (let i = 0; i < 4; i++) {
    const e = spawnBowlFish();
    if (e) { e.xPct = Math.random() * 80 + 10; bowlEntities.push(e); }
  }
  function animBowl() {
    bowlFrame++;
    if (bowlFrame % 120 === 0 && Math.random() > 0.4) {
      const e = spawnBowlFish(); if (e) bowlEntities.push(e);
    }
    for (let i = bowlEntities.length - 1; i >= 0; i--) {
      const e = bowlEntities[i];
      if (!e || !e.el.isConnected) { bowlEntities.splice(i, 1); continue; }
      e.xPct += e.speed * e.dir * 0.08;
      const yo = Math.sin(bowlFrame * 0.03 + e.wave) * e.waveAmp;
      e.el.style.left = e.xPct + '%';
      e.el.style.top = (e.yPct + yo) + '%';
      if ((e.dir === -1 && e.xPct < -20) || (e.dir === 1 && e.xPct > 110)) {
        clearInterval(e.wig); e.el.remove(); bowlEntities.splice(i, 1);
      }
    }
    bowlAnimId = requestAnimationFrame(animBowl);
  }
  bowlAnimId = requestAnimationFrame(animBowl);
}

function stopBowlAnim() {
  if (bowlAnimId) { cancelAnimationFrame(bowlAnimId); bowlAnimId = null; }
  bowlEntities.forEach(e => { if(e){ clearInterval(e.wig); e.el && e.el.remove(); } });
  bowlEntities.length = 0;
}

// ── Bowl bubbles ──────────────────────────────────────────────────────────────
function spawnBubbles() {
  const container = document.getElementById('bowl-bubbles');
  if (!container) return;
  const sizes = [3, 4, 5, 3, 6, 4];
  sizes.forEach((s, i) => {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.width = s + 'px';
    b.style.height = s + 'px';
    b.style.left = (20 + Math.random() * 60) + '%';
    b.style.bottom = (5 + Math.random() * 20) + '%';
    b.style.animationDuration = (4 + Math.random() * 4) + 's';
    b.style.animationDelay = (i * 1.1 + Math.random() * 2) + 's';
    container.appendChild(b);
  });
}

// ── Fishbowl popup logic ──────────────────────────────────────────────────────
let bowlVisible = false;
let bowlSize = 220;
let bowlX = null, bowlY = null;

function openBowl() {
  const popup = document.getElementById('fishbowl-popup');
  const closeBtn = document.getElementById('bowl-close');

  if (bowlX === null) {
    bowlX = window.innerWidth - bowlSize - 24;
    bowlY = window.innerHeight - bowlSize - 24;
  }

  popup.style.display = 'block';
  popup.style.width = bowlSize + 'px';
  popup.style.height = bowlSize + 'px';
  popup.style.left = bowlX + 'px';
  popup.style.top = bowlY + 'px';
  closeBtn.style.display = 'flex';
  bowlVisible = true;

  // opacity: fully opaque initially
  applyBowlOpacity(true);
  spawnBubbles();
  startBowlAnim();
  updBowlClock();
  initBowlDrag();
  initBowlResize();
  initBowlHoverOpacity();
}

function closeBowl() {
  const popup = document.getElementById('fishbowl-popup');
  const closeBtn = document.getElementById('bowl-close');
  popup.style.display = 'none';
  closeBtn.style.display = 'none';
  bowlVisible = false;
  stopBowlAnim();
  // clear bubbles
  const bb = document.getElementById('bowl-bubbles');
  if (bb) bb.innerHTML = '';
}

function applyBowlOpacity(hovered) {
  const clip = document.getElementById('bowl-clip');
  const popup = document.getElementById('fishbowl-popup');
  if (!clip || !popup) return;
  if (hovered) {
    clip.style.background = 'rgba(8,8,8,0.92)';
    popup.style.opacity = '1';
  } else {
    clip.style.background = 'rgba(8,8,8,0.60)';
    popup.style.opacity = '0.72';
  }
}

function initBowlHoverOpacity() {
  const popup = document.getElementById('fishbowl-popup');
  popup.addEventListener('mouseenter', () => applyBowlOpacity(true));
  popup.addEventListener('mouseleave', () => applyBowlOpacity(false));
  // start un-hovered
  setTimeout(() => applyBowlOpacity(false), 800);
}

// ── Bowl drag (move by dragging inside circle, not on resize ring) ────────────
function initBowlDrag() {
  const popup = document.getElementById('fishbowl-popup');
  const resizeRing = document.getElementById('bowl-resize-ring');
  let dragging = false, dx = 0, dy = 0;

  popup.addEventListener('mousedown', e => {
    // don't drag if clicking on bowl buttons or resize ring
    if (e.target.closest('.bowl-btn') || e.target === resizeRing) return;
    dragging = true;
    dx = e.clientX - popup.getBoundingClientRect().left;
    dy = e.clientY - popup.getBoundingClientRect().top;
    popup.style.cursor = 'grabbing';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    bowlX = e.clientX - dx;
    bowlY = e.clientY - dy;
    // clamp within window
    bowlX = Math.max(0, Math.min(window.innerWidth - bowlSize, bowlX));
    bowlY = Math.max(0, Math.min(window.innerHeight - bowlSize, bowlY));
    popup.style.left = bowlX + 'px';
    popup.style.top = bowlY + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; popup.style.cursor = ''; }
  });
}

// ── Bowl resize (drag ring edge) ──────────────────────────────────────────────
function initBowlResize() {
  const popup = document.getElementById('fishbowl-popup');
  const ring = document.getElementById('bowl-resize-ring');
  let resizing = false, startX, startY, startSize;

  ring.addEventListener('mousedown', e => {
    resizing = true;
    startX = e.clientX;
    startY = e.clientY;
    startSize = bowlSize;
    e.preventDefault();
    e.stopPropagation();
  });

  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const delta = Math.max(dx, dy);
    bowlSize = Math.max(140, Math.min(420, startSize + delta));
    popup.style.width = bowlSize + 'px';
    popup.style.height = bowlSize + 'px';
    // update font size for clock
    const bc = document.getElementById('bowl-clock');
    if (bc) {
      const fs = Math.max(1, Math.min(2.6, bowlSize / 100));
      bc.style.fontSize = fs + 'rem';
    }
  });

  document.addEventListener('mouseup', () => { resizing = false; });
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid rgba(255,255,255,0.15);color:#ccc;font-family:'Times New Roman',Times,serif;font-size:0.62rem;letter-spacing:0.08em;padding:8px 18px;z-index:200;opacity:0;transition:opacity 0.3s;`;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.style.opacity = '0'; }, 3500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('beforeunload', () => { autosave(); });

(function init() {
  const saved = loadAutosave();
  if (saved) {
    S.t    = saved.t    ?? 0;
    S.ls   = saved.ls   ?? 0;
    S.laps = saved.laps ?? [];
    S.mode = saved.mode ?? 'stopwatch';
    S.run  = false;
    document.getElementById('btn-sw').classList.toggle('on', S.mode === 'stopwatch');
    document.getElementById('btn-cd').classList.toggle('on', S.mode === 'countdown');
    if (S.t > 0) document.getElementById('lbtn').disabled = false;
    showToast(saved.wasRunning
      ? `> session restored (was running at ${fmt(saved.t)}) — press start to continue`
      : `> session restored at ${fmt(saved.t)}`
    );
  }
  updClock(); renderLaps(); renderSess();
})();
</script>
