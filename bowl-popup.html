<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>🐟 fishbowl timer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /*
   * The window is opened at exactly 440 × 440 px (square).
   * The bowl is a perfect circle clipped at 50% 50%.
   * For the oblate fishbowl shape (wider than tall) we scale
   * the body with scaleY so it looks like a real fishbowl.
   *
   * IMPORTANT: html/body must be transparent so that when the
   * Document PiP API is used, the browser sees through to the
   * desktop — only the clipped bowl shape is opaque.
   */
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    margin: 0; padding: 0;
  }

  /* ── Root: clip everything to the fishbowl ellipse ─────────────────────────
     Window: 440 × 440px (square)
     Bowl body ellipse: wider than tall — rx=48%, ry=44%, centred at 50% 54%
     This gives the oblate "fishbowl" shape, slightly wider than tall,
     and the centre is nudged down a touch so the rim opening sits at top.     */
  #bowl-root {
    position: fixed; inset: 0;
    clip-path: ellipse(48% 44% at 50% 54%);
  }

  /* Dark background — only visible inside the clipped ellipse */
  #bowl-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 90% 86% at 50% 54%,
      #111 55%, #0a0a0a 80%, #060606 100%);
  }

  /* ── Fish layer ─────────────────────────────────────────────────────────── */
  #bowl-fish { position: absolute; inset: 0; overflow: hidden; }
  .bf {
    position: absolute;
    /* Slightly grey — matches the subtle fish in the main site */
    color: rgba(160, 160, 160, 0.55);
    font-family: 'Courier New', monospace;
    white-space: pre; line-height: 1.2;
    pointer-events: none; user-select: none;
    /* Smaller fish so timer dominates */
    font-size: 0.72rem;
  }

  /* ── Bubbles ────────────────────────────────────────────────────────────── */
  #bubbles { position: absolute; inset: 0; pointer-events: none; }
  .bubble {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.10);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0)     scale(1);   opacity: 0.45; }
    100% { transform: translateY(-130px) scale(1.8); opacity: 0;    }
  }

  /* ── Glass SVG sits on top (pointer-events: none) ───────────────────────── */
  #bowl-glass {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 4;
  }

  /* ── Timer content ──────────────────────────────────────────────────────── */
  #content {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    /* slight downward push so content sits in the visual bowl centre */
    padding-top: 18px;
    gap: 4px;
  }

  /* BIG clock — the most prominent element */
  .clock {
    font-family: 'Times New Roman', Times, serif;
    font-size: 5.2rem; font-weight: 700;
    color: #f0f0f0;
    letter-spacing: -0.03em; line-height: 1;
    text-align: center;
    /* Subtle glow so it reads over the fish */
    text-shadow: 0 0 28px rgba(255,255,255,0.12);
    position: relative; z-index: 2;
  }
  .clock .sep { color: #4a4a4a; animation: blink 1s step-end infinite; }
  .clock.paused .sep { animation: none; opacity: 0.22; }
  @keyframes blink { 50% { opacity: 0.08; } }

  .mode-lbl {
    font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: #3a3a3a; font-family: 'Times New Roman', serif;
    position: relative; z-index: 2;
  }
  .lap-tick {
    font-family: 'Courier New', monospace;
    font-size: 0.58rem; letter-spacing: 0.07em; color: #4a4a4a; min-height: 14px;
    position: relative; z-index: 2;
  }
  .lap-tick .t { color: #777; }

  /* Bigger buttons */
  .btns { display: flex; gap: 8px; margin-top: 10px; position: relative; z-index: 2; }
  .bb {
    background: none; border: 1px solid rgba(255,255,255,0.14);
    color: #666; font-family: 'Times New Roman', serif;
    font-size: 0.62rem; letter-spacing: 0.09em; text-transform: uppercase;
    padding: 6px 14px; cursor: pointer; transition: all 0.12s;
  }
  .bb:hover { border-color: rgba(255,255,255,0.35); color: #ccc; }
  .bb.bp { border-color: rgba(255,255,255,0.22); color: #aaa; }
  .bb:disabled { opacity: 0.14; cursor: not-allowed; }
  .bb.red:hover { border-color: #7a2020; color: #c04040; }

  /* Close btn — inside ellipse, top-right safe zone */
  #close-btn {
    position: absolute; top: 16%; right: 15%; z-index: 10;
    background: rgba(10,10,10,0.6);
    border: 1px solid rgba(255,255,255,0.14);
    color: #555; font-family: 'Courier New', monospace;
    font-size: 0.6rem; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.12s; line-height: 1;
  }
  #close-btn:hover { border-color: #8a2020; color: #c04040; }

  /* Lap modal */
  #lap-ovl {
    position: absolute; inset: 0; background: rgba(0,0,0,0.93);
    z-index: 20; display: none; align-items: center; justify-content: center;
  }
  .lm {
    background: #0c0c0c; border: 1px solid rgba(255,255,255,0.15);
    padding: 1rem 1.3rem; width: 240px;
  }
  .lm h3 { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb; margin-bottom: 0.5rem; font-family: 'Times New Roman', serif; }
  .lm p  { font-size: 0.52rem; color: #555; margin-bottom: 0.8rem; letter-spacing: 0.06em; font-family: 'Times New Roman', serif; }
  .lm p span { color: #888; }
  .lm input {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.14);
    color: #ccc; font-family: 'Times New Roman', serif; font-size: 0.58rem;
    padding: 6px 8px; outline: none; margin-bottom: 0.8rem; letter-spacing: 0.04em;
  }
  .lm input:focus { border-color: #666; }
  .lm input::placeholder { color: #2a2a2a; }
  .lm-acts { display: flex; gap: 5px; justify-content: flex-end; }

  /* ── Fallback banner (shown only when NOT in PiP / not in popup) ─────────
     When opened as a normal tab (Firefox etc.) we show a notice               */
  #tab-notice {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: #080808; color: #666;
    font-family: 'Times New Roman', serif;
    font-size: 0.7rem; letter-spacing: 0.1em;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 1rem; text-align: center; padding: 2rem;
  }
  #tab-notice .big { font-size: 2rem; color: #333; }
  #tab-notice a { color: #777; text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>

<!-- Shown only if opened as a normal browser tab (not popup/PiP) -->
<div id="tab-notice">
  <div class="big">&gt;º)&gt;</div>
  <div>this page is the fishbowl pop-out.<br>
  open it from the main timer using the<br>
  <strong style="color:#888">&gt;º)&gt; pop-out fishbowl</strong> button.</div>
</div>

<div id="bowl-root">

  <!-- 1. Dark background -->
  <div id="bowl-bg"></div>

  <!-- 2. Fish -->
  <div id="bowl-fish"></div>

  <!-- 3. Bubbles -->
  <div id="bubbles"></div>

  <!--
    4. Glass SVG overlay
       viewBox: 440 × 440 (matches window dimensions)
       Bowl body ellipse: cx=220, cy=238, rx=211, ry=194
         → as % of 440: cx=50%, cy=54.1%, rx=48%, ry=44.1%  ← matches clip-path
       Open rim: sits at cy=72, rx=152, ry=21
  -->
  <svg id="bowl-glass" viewBox="0 0 440 440"
       xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <radialGradient id="shL" cx="25%" cy="27%" r="33%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.07)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <radialGradient id="shR" cx="76%" cy="73%" r="22%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.032)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <linearGradient id="rimG" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.02)"/>
        <stop offset="28%"  stop-color="rgba(255,255,255,0.22)"/>
        <stop offset="52%"  stop-color="rgba(255,255,255,0.30)"/>
        <stop offset="76%"  stop-color="rgba(255,255,255,0.20)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
      </linearGradient>
      <clipPath id="bClip">
        <ellipse cx="220" cy="238" rx="211" ry="194"/>
      </clipPath>
    </defs>

    <!-- Main bowl edge ring — perfectly coincides with clip-path -->
    <ellipse cx="220" cy="238" rx="211" ry="194"
             fill="none" stroke="rgba(180,180,180,0.20)" stroke-width="2"/>

    <!-- Glass sheen fills (clipped to bowl) -->
    <ellipse cx="220" cy="238" rx="211" ry="194" fill="url(#shL)" clip-path="url(#bClip)"/>
    <ellipse cx="220" cy="238" rx="211" ry="194" fill="url(#shR)" clip-path="url(#bClip)"/>

    <!-- Highlight streak upper-left -->
    <ellipse cx="122" cy="140" rx="24" ry="70"
             fill="rgba(255,255,255,0.026)" transform="rotate(-22 122 140)"/>

    <!-- Open rim at top of bowl -->
    <ellipse cx="220" cy="72" rx="152" ry="21"
             fill="rgba(12,12,12,0)" stroke="rgba(200,200,200,0.36)" stroke-width="2"/>
    <ellipse cx="220" cy="72" rx="152" ry="21" fill="url(#rimG)" opacity="0.8"/>
    <!-- Inner rim shadow (glass wall depth) -->
    <ellipse cx="220" cy="77" rx="134" ry="14"
             fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.05)" stroke-width="0.6"/>

    <!-- Rim-to-body glass wall curves -->
    <path d="M 68,72 Q 64,78 68,90"  stroke="rgba(255,255,255,0.18)" stroke-width="1.6" fill="none"/>
    <path d="M 372,72 Q 376,78 372,90" stroke="rgba(255,255,255,0.18)" stroke-width="1.6" fill="none"/>

    <!-- Water line near base -->
    <text x="25" y="370" font-family="'Courier New',monospace"
          font-size="8.5" fill="rgba(85,85,85,0.28)" letter-spacing="4">
      ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~
    </text>

    <!-- Base foot / stand -->
    <ellipse cx="220" cy="428" rx="88" ry="8"
             fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  </svg>

  <!-- 5. Timer -->
  <div id="content">
    <div class="clock paused" id="clock">
      <span id="sm">00</span><span class="sep">:</span><span id="ss">00</span>
    </div>
    <div class="mode-lbl" id="mlbl">// stopwatch</div>
    <div class="lap-tick" id="ltick"></div>
    <div class="btns">
      <button class="bb red" onclick="doReset()">[ rst ]</button>
      <button class="bb bp"  id="sbtn" onclick="doToggle()">[ start ]</button>
      <button class="bb"     id="lbtn" onclick="doLap()" disabled>[ lap ]</button>
    </div>
  </div>

  <!-- 6. Close -->
  <button id="close-btn" onclick="window.close()">✕</button>

  <!-- 7. Lap modal -->
  <div id="lap-ovl">
    <div class="lm">
      <h3>// name this block</h3>
      <p>duration: <span id="ldur">—</span></p>
      <input type="text" id="linput" placeholder="subject / topic ..." maxlength="40"/>
      <div class="lm-acts">
        <button class="bb" onclick="cancelLap()">[ cancel ]</button>
        <button class="bb bp" onclick="saveLap()">[ save ]</button>
      </div>
    </div>
  </div>

</div><!-- #bowl-root -->

<script>
// ── Detect if we're a proper popup/PiP or a regular tab ──────────────────────
// If opened as a normal tab (not via window.open or documentPiP),
// show the notice instead of the bowl.
(function detectContext(){
  const isPopup = window.opener !== null ||
                  ('documentPictureInPicture' in window && documentPictureInPicture.window === window);
  const isSmallWindow = window.outerWidth < 700 && window.outerHeight < 700;
  if(!isPopup && !isSmallWindow){
    document.getElementById('tab-notice').style.display = 'flex';
    document.getElementById('bowl-root').style.display  = 'none';
  }
})();

// ── State via localStorage ────────────────────────────────────────────────────
const KEY = 'fishbowl_state';
function getState(){ try{ return JSON.parse(localStorage.getItem(KEY)||'null'); }catch{ return null; } }
function setState(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch{} }

const pad = n => String(Math.floor(Math.abs(n))).padStart(2,'0');
const fmt = s => `${pad(s/60)}:${pad(s%60)}`;

let lT=0, lRun=false, lMode='stopwatch', lLs=0, lLaps=[];
let sAt=null, pend=null;

function getCurT(){
  if(!lRun||sAt===null) return lT;
  const el=(performance.now()-sAt)/1000;
  return lMode==='countdown'?Math.max(0,lT-el):lT+el;
}
function updDisp(){
  const t=Math.floor(getCurT());
  document.getElementById('sm').textContent=pad(t/60);
  document.getElementById('ss').textContent=pad(t%60);
  document.getElementById('clock').classList.toggle('paused',!lRun);
  document.getElementById('mlbl').textContent=`// ${lMode}`;
  const lt=document.getElementById('ltick');
  if(lRun){const e=getCurT()-lLs;lt.innerHTML=`lap ${lLaps.length+1} <span class="t">${fmt(e)}</span>`;}
  else lt.textContent='';
  document.getElementById('sbtn').textContent=lRun?'[ pause ]':'[ start ]';
  document.getElementById('lbtn').disabled=!lRun;
}
function pushUp(){
  setState({t:getCurT(),run:lRun,mode:lMode,ls:lLs,laps:lLaps,
    startWall:lRun?Date.now()-(performance.now()-sAt):null});
}
function syncDown(){
  const st=getState(); if(!st) return;
  const wasRun=lRun;
  if(st.run!==lRun||Math.abs(st.t-lT)>1.5){
    lT=st.t; lRun=st.run; lMode=st.mode||'stopwatch'; lLs=st.ls||0; lLaps=st.laps||[];
    if(lRun&&!wasRun&&st.startWall) sAt=performance.now()-(Date.now()-st.startWall);
    else if(!lRun) sAt=null;
  }
  updDisp();
}

function doToggle(){
  if(lRun){lT=getCurT();sAt=null;lRun=false;}
  else{sAt=performance.now();lRun=true;}
  pushUp(); updDisp();
}
function doReset(){
  lT=0;lRun=false;sAt=null;lLs=0;lLaps=[];pend=null;
  document.getElementById('lap-ovl').style.display='none';
  pushUp(); updDisp();
}
function doLap(){
  if(!lRun) return;
  const now=getCurT(); const dur=now-lLs; if(dur<1) return;
  pend={start:lLs,end:now,duration:dur};
  document.getElementById('ldur').textContent=fmt(dur);
  document.getElementById('linput').value='';
  document.getElementById('lap-ovl').style.display='flex';
  setTimeout(()=>document.getElementById('linput').focus(),30);
}
function saveLap(){
  const name=document.getElementById('linput').value.trim()||`block ${lLaps.length+1}`;
  lLaps.push({...pend,name,ci:lLaps.length%6});
  lLs=pend.end; pend=null;
  document.getElementById('lap-ovl').style.display='none';
  pushUp(); updDisp();
}
function cancelLap(){pend=null;document.getElementById('lap-ovl').style.display='none';}
document.getElementById('linput').addEventListener('keydown',e=>{
  if(e.key==='Enter')saveLap(); if(e.key==='Escape')cancelLap();
});

setInterval(()=>{
  if(lRun){
    if(lMode==='countdown'&&getCurT()<=0){doReset();return;}
    updDisp(); pushUp();
  }
},250);
setInterval(syncDown,1000);

// ── Fish ──────────────────────────────────────────────────────────────────────
const bowlFish=[
  {l:[`><(((º>`,`><((( >`], r:[`<º)))><`,`< )))><`]},
  {l:[`>°)))><`, `>°)))-`],  r:[`<(((°<`, `-(((°<`]},
  {l:[`>·(((º>`,`>=(((º>`],  r:[`<º)))·<`,`<º)))-<`]},
  {l:[`-º))))>`, `-°))))>`],  r:[`<((((º-`,`<((((°-`]},
  {l:[`»»»º>`,  `»»»°>`],    r:[`<º«««`,  `<°«««`]},
  {l:[`~·~·º>`, `~·~·°>`],   r:[`<º·~·~`, `<°·~·~`]},
  {l:[`===º>>>`,`===°>>>`],   r:[`<<<º===`,`<<<°===`]},
  {l:[`ø·ø·ø>`, `ø·ø·ø-`],   r:[`<ø·ø·ø`, `-ø·ø·ø`]},
  {l:[`*==º==>`,`*==°==>`],   r:[`<==º==*`,`<==°==*`]},
  {l:[`--·º)>`, `--·°)>`],    r:[`<(º·--`, `<(°·--`]},
];

const bents=[]; let bframe=0;

function spawnBF(){
  const sky=document.getElementById('bowl-fish');
  const spec=bowlFish[Math.floor(Math.random()*bowlFish.length)];
  const fr=Math.random()>.5;
  const frames=fr?spec.r:spec.l;
  const el=document.createElement('div');
  el.className='bf'; el.textContent=frames[0];
  // Smaller fish: 0.65 – 0.95rem
  el.style.fontSize=`${(Math.random()*0.3+0.65).toFixed(2)}rem`;
  el.style.opacity=(Math.random()*0.25+0.45).toFixed(2);
  // Y: 18%–70% — within the bowl body, well clear of rim and base
  const yp=Math.random()*52+18;
  let xp=fr?112:-20;
  el.style.top=yp+'%'; el.style.left=xp+'%';
  sky.appendChild(el);
  let fi=0;
  const wig=setInterval(()=>{
    if(!el.isConnected){clearInterval(wig);return;}
    fi=(fi+1)%frames.length; el.textContent=frames[fi];
  },330+Math.random()*370);
  return{el,xp,yp,speed:Math.random()*0.45+0.12,dir:fr?-1:1,
         wave:Math.random()*Math.PI*2,wAmp:Math.random()*1.4+0.5,wig};
}

// Seed 6 fish spread across the bowl
for(let i=0;i<6;i++){
  const e=spawnBF();
  if(e){e.xp=Math.random()*70+8;e.el.style.left=e.xp+'%';bents.push(e);}
}

function animBowl(){
  bframe++;
  if(bframe%110===0&&Math.random()>0.4){const e=spawnBF();if(e)bents.push(e);}
  for(let i=bents.length-1;i>=0;i--){
    const e=bents[i];
    if(!e||!e.el.isConnected){bents.splice(i,1);continue;}
    e.xp+=e.speed*e.dir*0.07;
    const yo=Math.sin(bframe*0.028+e.wave)*e.wAmp;
    e.el.style.left=e.xp+'%'; e.el.style.top=(e.yp+yo)+'%';
    if((e.dir===-1&&e.xp<-24)||(e.dir===1&&e.xp>116)){
      clearInterval(e.wig); e.el.remove(); bents.splice(i,1);
    }
  }
  requestAnimationFrame(animBowl);
}
requestAnimationFrame(animBowl);

// ── Bubbles ───────────────────────────────────────────────────────────────────
const bc=document.getElementById('bubbles');
[3,4,3,5,4,3,6,4,5,3].forEach((s,i)=>{
  const b=document.createElement('div'); b.className='bubble';
  b.style.width=s+'px'; b.style.height=s+'px';
  b.style.left=(22+Math.random()*56)+'%';
  b.style.bottom=(8+Math.random()*24)+'%';
  b.style.animationDuration=(5+Math.random()*6)+'s';
  b.style.animationDelay=(i*0.7+Math.random()*3)+'s';
  bc.appendChild(b);
});

// ── Init ──────────────────────────────────────────────────────────────────────
(function init(){
  const st=getState();
  if(st){
    lT=st.t??0; lRun=st.run??false; lMode=st.mode??'stopwatch';
    lLs=st.ls??0; lLaps=st.laps??[];
    if(lRun&&st.startWall) sAt=performance.now()-(Date.now()-st.startWall);
  }
  updDisp();
})();
</script>
</body>
</html>
