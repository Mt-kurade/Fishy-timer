<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>🐟 fishbowl</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Fully transparent page — only the clipped bowl ellipse is visible.
     Works in both Document PiP (Chrome) and window.open (all browsers). */
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
  }

  /* ── Fishbowl ellipse clip ──────────────────────────────────────────────────
     Window: 440 × 440 px square.
     The clip + the SVG body ellipse below use the SAME geometry:
       cx = 220 = 50% of 440
       cy = 238 = 54.1% of 440   (nudged down so rim opening is at top)
       rx = 211 = 48.0% of 440
       ry = 194 = 44.1% of 440                                                */
  #bowl-root {
    position: fixed; inset: 0;
    clip-path: ellipse(48% 44.1% at 50% 54.1%);
  }

  /* Dark radial fill — only visible inside the clipped shape */
  #bowl-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 88% 84% at 50% 56%,
      #111 52%, #0a0a0a 78%, #060606 100%);
  }

  /* Fish layer */
  #bowl-fish { position: absolute; inset: 0; overflow: hidden; }
  .bf {
    position: absolute;
    color: rgba(155, 155, 155, 0.52);   /* subtle grey, same tone as main site */
    font-family: 'Courier New', monospace;
    white-space: pre; line-height: 1.2;
    pointer-events: none; user-select: none;
    font-size: 0.72rem;
  }

  /* Bubbles */
  #bubbles { position: absolute; inset: 0; pointer-events: none; }
  .bubble {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.09);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0)      scale(1);   opacity: 0.45; }
    100% { transform: translateY(-120px) scale(1.7); opacity: 0;    }
  }

  /* Glass SVG on top — rim, edge ring, sheen */
  #bowl-glass {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 4;
  }

  /* Timer content */
  #content {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding-top: 20px;   /* push down into bowl body visually */
    gap: 5px;
  }

  /* Clock — dominant, large, glowing white */
  .clock {
    font-family: 'Times New Roman', Times, serif;
    font-size: 5.4rem; font-weight: 700;
    color: #f2f2f2;
    letter-spacing: -0.03em; line-height: 1;
    text-align: center;
    text-shadow: 0 0 30px rgba(255,255,255,0.10);
    position: relative; z-index: 2;
  }
  .clock .sep { color: #484848; animation: blink 1s step-end infinite; }
  .clock.paused .sep { animation: none; opacity: 0.20; }
  @keyframes blink { 50% { opacity: 0.07; } }

  .mode-lbl {
    font-size: 0.63rem; letter-spacing: 0.20em; text-transform: uppercase;
    color: #383838; font-family: 'Times New Roman', serif;
    position: relative; z-index: 2;
  }
  .lap-tick {
    font-family: 'Courier New', monospace;
    font-size: 0.58rem; letter-spacing: 0.07em;
    color: #484848; min-height: 14px;
    position: relative; z-index: 2;
  }
  .lap-tick .t { color: #767676; }

  .btns { display: flex; gap: 8px; margin-top: 10px; position: relative; z-index: 2; }
  .bb {
    background: none; border: 1px solid rgba(255,255,255,0.13);
    color: #606060; font-family: 'Times New Roman', serif;
    font-size: 0.62rem; letter-spacing: 0.09em; text-transform: uppercase;
    padding: 6px 14px; cursor: pointer; transition: all 0.12s;
  }
  .bb:hover  { border-color: rgba(255,255,255,0.34); color: #c8c8c8; }
  .bb.bp     { border-color: rgba(255,255,255,0.21); color: #a0a0a0; }
  .bb:disabled { opacity: 0.13; cursor: not-allowed; }
  .bb.red:hover { border-color: #7a2020; color: #c04040; }

  /* Close btn — top-right inside the ellipse safe zone */
  #close-btn {
    position: absolute; top: 15%; right: 14%; z-index: 10;
    background: rgba(8,8,8,0.65);
    border: 1px solid rgba(255,255,255,0.13);
    color: #505050; font-family: 'Courier New', monospace;
    font-size: 0.6rem; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.12s; line-height: 1;
  }
  #close-btn:hover { border-color: #8a2020; color: #c04040; }

  /* Lap-name modal */
  #lap-ovl {
    position: absolute; inset: 0; background: rgba(0,0,0,0.93);
    z-index: 20; display: none; align-items: center; justify-content: center;
  }
  .lm {
    background: #0c0c0c; border: 1px solid rgba(255,255,255,0.15);
    padding: 1rem 1.3rem; width: 240px;
  }
  .lm h3 { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
            color: #bbb; margin-bottom: 0.5rem; font-family: 'Times New Roman', serif; }
  .lm p  { font-size: 0.52rem; color: #555; margin-bottom: 0.8rem;
            letter-spacing: 0.06em; font-family: 'Times New Roman', serif; }
  .lm p span { color: #888; }
  .lm input {
    width: 100%; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.14);
    color: #ccc; font-family: 'Times New Roman', serif; font-size: 0.58rem;
    padding: 6px 8px; outline: none; margin-bottom: 0.8rem; letter-spacing: 0.04em;
  }
  .lm input:focus { border-color: #666; }
  .lm input::placeholder { color: #282828; }
  .lm-acts { display: flex; gap: 5px; justify-content: flex-end; }
</style>
</head>
<body>
<div id="bowl-root">

  <!-- 1. Background fill -->
  <div id="bowl-bg"></div>

  <!-- 2. Fish -->
  <div id="bowl-fish"></div>

  <!-- 3. Bubbles -->
  <div id="bubbles"></div>

  <!--
    4. Glass SVG overlay  (viewBox 440 × 440)
       Bowl body ellipse  : cx=220  cy=238  rx=211  ry=194   ← same as clip-path
       Open rim           : cx=220  cy=70   rx=152  ry=21
  -->
  <svg id="bowl-glass" viewBox="0 0 440 440"
       xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <radialGradient id="shL" cx="25%" cy="27%" r="33%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.068)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <radialGradient id="shR" cx="76%" cy="74%" r="21%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.030)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <linearGradient id="rimG" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.02)"/>
        <stop offset="26%"  stop-color="rgba(255,255,255,0.21)"/>
        <stop offset="51%"  stop-color="rgba(255,255,255,0.31)"/>
        <stop offset="76%"  stop-color="rgba(255,255,255,0.19)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
      </linearGradient>
      <clipPath id="bClip">
        <ellipse cx="220" cy="238" rx="211" ry="194"/>
      </clipPath>
    </defs>

    <!-- Outer edge ring — coincides with clip-path so border = bowl boundary -->
    <ellipse cx="220" cy="238" rx="211" ry="194"
             fill="none" stroke="rgba(175,175,175,0.19)" stroke-width="2"/>

    <!-- Sheen overlays (clipped) -->
    <ellipse cx="220" cy="238" rx="211" ry="194" fill="url(#shL)" clip-path="url(#bClip)"/>
    <ellipse cx="220" cy="238" rx="211" ry="194" fill="url(#shR)" clip-path="url(#bClip)"/>

    <!-- Upper-left highlight streak -->
    <ellipse cx="120" cy="138" rx="23" ry="68"
             fill="rgba(255,255,255,0.025)" transform="rotate(-22 120 138)"/>

    <!-- Open rim at top of bowl -->
    <ellipse cx="220" cy="70" rx="152" ry="21"
             fill="none" stroke="rgba(195,195,195,0.35)" stroke-width="2"/>
    <ellipse cx="220" cy="70" rx="152" ry="21" fill="url(#rimG)" opacity="0.82"/>
    <!-- Inner rim shadow (glass wall depth) -->
    <ellipse cx="220" cy="75" rx="134" ry="13"
             fill="rgba(0,0,0,0.21)" stroke="rgba(255,255,255,0.05)" stroke-width="0.7"/>

    <!-- Rim-to-body glass wall curves (left & right) -->
    <path d="M 68,70 Q 64,77 68,90"   stroke="rgba(255,255,255,0.17)" stroke-width="1.6" fill="none"/>
    <path d="M 372,70 Q 376,77 372,90" stroke="rgba(255,255,255,0.17)" stroke-width="1.6" fill="none"/>

    <!-- Water-line hint near the base -->
    <text x="22" y="372" font-family="'Courier New',monospace"
          font-size="8" fill="rgba(82,82,82,0.26)" letter-spacing="4.2">
      ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~  ~
    </text>

    <!-- Base foot -->
    <ellipse cx="220" cy="430" rx="86" ry="8"
             fill="rgba(255,255,255,0.014)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  </svg>

  <!-- 5. Timer display -->
  <div id="content">
    <div class="clock paused" id="clock">
      <span id="sm">00</span><span class="sep">:</span><span id="ss">00</span>
    </div>
    <div class="mode-lbl" id="mlbl">// stopwatch</div>
    <div class="lap-tick" id="ltick"></div>
    <div class="btns">
      <button class="bb red" onclick="doReset()">[ rst ]</button>
      <button class="bb bp"  id="sbtn" onclick="doToggle()">[ start ]</button>
      <button class="bb"     id="lbtn" onclick="doLap()" disabled>[ lap ]</button>
    </div>
  </div>

  <!-- 6. Close -->
  <button id="close-btn" onclick="window.close()">✕</button>

  <!-- 7. Lap modal -->
  <div id="lap-ovl">
    <div class="lm">
      <h3>// name this block</h3>
      <p>duration: <span id="ldur">—</span></p>
      <input type="text" id="linput" placeholder="subject / topic ..." maxlength="40"/>
      <div class="lm-acts">
        <button class="bb" onclick="cancelLap()">[ cancel ]</button>
        <button class="bb bp" onclick="saveLap()">[ save ]</button>
      </div>
    </div>
  </div>

</div><!-- #bowl-root -->

<script>
/*
 * SYNC STRATEGY — single source of truth lives in the MAIN PAGE.
 *
 * The main page writes to localStorage key 'fishbowl_state' every 250ms:
 *   { t, run, mode, ls, laps, startWall }
 *   where startWall = the absolute wall-clock millisecond when the timer
 *   was last started (Date.now() at that moment).
 *
 * This popup is DISPLAY-ONLY for the running time:
 *   currentT = (Date.now() - startWall) / 1000   [when running]
 *   currentT = t                                   [when paused]
 *
 * Controls (start/pause/reset/lap) write a command back to localStorage
 * key 'fishbowl_cmd' and the main page acts on it within 250ms.
 * The popup never runs its own interval for the clock — it derives the
 * time from wall-clock arithmetic so it is always perfectly in sync.
 */

const STATE_KEY = 'fishbowl_state';
const CMD_KEY   = 'fishbowl_cmd';

const pad = n => String(Math.floor(Math.abs(n))).padStart(2, '0');
const fmt = s => `${pad(s/60)}:${pad(s%60)}`;

// Last known state from main page
let st = { t:0, run:false, mode:'stopwatch', ls:0, laps:[], startWall:null };
let pend = null;   // pending lap

// ── Derive current time purely from wall clock ─────────────────────────────────
function curT() {
  if (!st.run || !st.startWall) return st.t;
  const elapsed = (Date.now() - st.startWall) / 1000;
  return st.mode === 'countdown'
    ? Math.max(0, st.t - elapsed)
    : st.t + elapsed;
}

// ── Update display ─────────────────────────────────────────────────────────────
function render() {
  const t = Math.floor(curT());
  document.getElementById('sm').textContent = pad(t / 60);
  document.getElementById('ss').textContent = pad(t % 60);
  document.getElementById('clock').classList.toggle('paused', !st.run);
  document.getElementById('mlbl').textContent = `// ${st.mode}`;
  const lt = document.getElementById('ltick');
  if (st.run) {
    const e = curT() - st.ls;
    lt.innerHTML = `lap ${st.laps.length + 1} <span class="t">${fmt(e)}</span>`;
  } else {
    lt.textContent = '';
  }
  document.getElementById('sbtn').textContent = st.run ? '[ pause ]' : '[ start ]';
  document.getElementById('lbtn').disabled = !st.run;
}

// ── Poll main page state every 100ms for smooth display ───────────────────────
function pollState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    // Only update if something meaningful changed
    if (parsed.run    !== st.run  ||
        parsed.mode   !== st.mode ||
        parsed.laps?.length !== st.laps?.length) {
      st = parsed;
    } else {
      // Always update t and startWall so time stays accurate
      st.t         = parsed.t;
      st.startWall = parsed.startWall;
    }
  } catch {}
  render();
}
setInterval(pollState, 100);

// ── Send commands to main page via localStorage ────────────────────────────────
function sendCmd(cmd, payload) {
  try {
    localStorage.setItem(CMD_KEY, JSON.stringify({
      cmd, payload, ts: Date.now()
    }));
  } catch {}
}

// ── Controls ── write commands; display updates on next poll ───────────────────
function doToggle() { sendCmd(st.run ? 'pause' : 'start'); }
function doReset()  { sendCmd('reset'); }

function doLap() {
  if (!st.run) return;
  const now = curT();
  const dur = now - st.ls;
  if (dur < 1) return;
  pend = { start: st.ls, end: now, duration: dur };
  document.getElementById('ldur').textContent = fmt(dur);
  document.getElementById('linput').value = '';
  document.getElementById('lap-ovl').style.display = 'flex';
  setTimeout(() => document.getElementById('linput').focus(), 30);
}
function saveLap() {
  const name = document.getElementById('linput').value.trim() ||
               `block ${st.laps.length + 1}`;
  sendCmd('lap', { ...pend, name });
  pend = null;
  document.getElementById('lap-ovl').style.display = 'none';
}
function cancelLap() {
  pend = null;
  document.getElementById('lap-ovl').style.display = 'none';
}
document.getElementById('linput').addEventListener('keydown', e => {
  if (e.key === 'Enter')  saveLap();
  if (e.key === 'Escape') cancelLap();
});

// ── Fish animation ─────────────────────────────────────────────────────────────
const bowlFish = [
  { l:[`><(((º>`,`><((( >`], r:[`<º)))><`,`< )))><`] },
  { l:[`>°)))><`, `>°)))-`],  r:[`<(((°<`, `-(((°<`]  },
  { l:[`>·(((º>`,`>=(((º>`],  r:[`<º)))·<`,`<º)))-<`] },
  { l:[`-º))))>`, `-°))))>`],  r:[`<((((º-`,`<((((°-`] },
  { l:[`»»»º>`,  `»»»°>`],    r:[`<º«««`,  `<°«««`]   },
  { l:[`~·~·º>`, `~·~·°>`],   r:[`<º·~·~`, `<°·~·~`]  },
  { l:[`===º>>>`,`===°>>>`],   r:[`<<<º===`,`<<<°===`]  },
  { l:[`ø·ø·ø>`, `ø·ø·ø-`],   r:[`<ø·ø·ø`, `-ø·ø·ø`]  },
  { l:[`*==º==>`,`*==°==>`],   r:[`<==º==*`,`<==°==*`]  },
  { l:[`--·º)>`, `--·°)>`],    r:[`<(º·--`, `<(°·--`]   },
];
const bents = []; let bframe = 0;

function spawnBF() {
  const sky  = document.getElementById('bowl-fish');
  const spec = bowlFish[Math.floor(Math.random() * bowlFish.length)];
  const fr   = Math.random() > 0.5;
  const frames = fr ? spec.r : spec.l;
  const el = document.createElement('div');
  el.className = 'bf'; el.textContent = frames[0];
  el.style.fontSize = `${(Math.random() * 0.28 + 0.60).toFixed(2)}rem`;
  el.style.opacity  = (Math.random() * 0.22 + 0.42).toFixed(2);
  const yp = Math.random() * 50 + 20;   // 20%–70% of height
  let xp = fr ? 112 : -18;
  el.style.top = yp + '%'; el.style.left = xp + '%';
  sky.appendChild(el);
  let fi = 0;
  const wig = setInterval(() => {
    if (!el.isConnected) { clearInterval(wig); return; }
    fi = (fi + 1) % frames.length; el.textContent = frames[fi];
  }, 320 + Math.random() * 360);
  return { el, xp, yp,
    speed: Math.random() * 0.42 + 0.10,
    dir:   fr ? -1 : 1,
    wave:  Math.random() * Math.PI * 2,
    wAmp:  Math.random() * 1.3 + 0.5, wig };
}

// Seed fish spread across the bowl
for (let i = 0; i < 6; i++) {
  const e = spawnBF();
  if (e) { e.xp = Math.random() * 70 + 8; e.el.style.left = e.xp + '%'; bents.push(e); }
}

function animBowl() {
  bframe++;
  if (bframe % 115 === 0 && Math.random() > 0.42) {
    const e = spawnBF(); if (e) bents.push(e);
  }
  for (let i = bents.length - 1; i >= 0; i--) {
    const e = bents[i];
    if (!e || !e.el.isConnected) { bents.splice(i, 1); continue; }
    e.xp += e.speed * e.dir * 0.07;
    const yo = Math.sin(bframe * 0.028 + e.wave) * e.wAmp;
    e.el.style.left = e.xp + '%';
    e.el.style.top  = (e.yp + yo) + '%';
    if ((e.dir === -1 && e.xp < -22) || (e.dir === 1 && e.xp > 114)) {
      clearInterval(e.wig); e.el.remove(); bents.splice(i, 1);
    }
  }
  requestAnimationFrame(animBowl);
}
requestAnimationFrame(animBowl);

// ── Bubbles ────────────────────────────────────────────────────────────────────
const bc = document.getElementById('bubbles');
[3, 4, 3, 5, 4, 3, 6, 4, 5, 3].forEach((s, i) => {
  const b = document.createElement('div'); b.className = 'bubble';
  b.style.width  = s + 'px'; b.style.height = s + 'px';
  b.style.left   = (22 + Math.random() * 56) + '%';
  b.style.bottom = (8  + Math.random() * 24) + '%';
  b.style.animationDuration = (5 + Math.random() * 6) + 's';
  b.style.animationDelay   = (i * 0.7 + Math.random() * 3) + 's';
  bc.appendChild(b);
});

// Initial render from whatever state is already in localStorage
pollState();
</script>
</body>
</html>
